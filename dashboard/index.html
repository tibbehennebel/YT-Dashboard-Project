<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>YouTube Battle — Goud vs Zilver</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YT Battle">
  <meta name="theme-color" content="#0e1116">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap">
  <style>
    :root {
      --page: #0e1116;
      --panel: #151a22;
      --panel-2: #1b2130;
      --ink: #edf0f4;
      --ink-2: #9aa4b5;
      --muted: #7a8499;
      --hair: rgba(255,255,255,.09);
      --grid: #1c2230;
      --axis: #2b3345;
      --gold: #c98500;        /* gevalideerde mark-kleur (grafieken) */
      --gold-ui: #e8b33c;     /* ui-accent */
      --silver: #7e8da3;      /* gevalideerde mark-kleur */
      --silver-ui: #c7d0dc;
      --good: #3fd06c;
      --bad: #f27d7d;
      --disp: "Barlow Condensed", "Arial Narrow", system-ui, sans-serif;
      --body: "Barlow", system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; min-width: 0; }
    html { background: var(--page); -webkit-text-size-adjust: 100%; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { margin: 0; background: var(--page); color: var(--ink); font-family: var(--body);
      font-size: 14px; line-height: 1.45; -webkit-tap-highlight-color: transparent; }
    .app { max-width: 1020px; margin: 0 auto; padding: 18px 18px 80px;
      padding-left: max(18px, env(safe-area-inset-left));
      padding-right: max(18px, env(safe-area-inset-right));
      padding-top: max(18px, env(safe-area-inset-top)); }
    svg { display: block; max-width: 100%; }
    button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
    :focus-visible { outline: 2px solid var(--gold-ui); outline-offset: 2px; border-radius: 2px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

    /* ── typografische bouwstenen ─────────────────────────────── */
    .eyebrow { font-family: var(--disp); font-weight: 600; font-size: 13px; letter-spacing: .16em;
      text-transform: uppercase; color: var(--muted); }
    .disp { font-family: var(--disp); font-weight: 600; letter-spacing: .01em; }

    /* ── header ───────────────────────────────────────────────── */
    .hdr { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; padding-bottom: 14px; }
    .brand { font-family: var(--disp); font-weight: 700; font-size: 21px; letter-spacing: .12em; text-transform: uppercase; }
    .brand em { font-style: normal; color: var(--gold-ui); }
    .hdr-meta { margin-left: auto; font-family: var(--disp); font-weight: 500; font-size: 13px;
      letter-spacing: .12em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

    /* ── acties ───────────────────────────────────────────────── */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 2px 0 6px; }
    .btn { font-family: var(--disp); font-weight: 600; font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--ink-2); border: 1px solid var(--hair); border-radius: 8px; padding: 8px 14px;
      transition: color .15s, border-color .15s, background .15s; }
    .btn:hover { color: var(--ink); border-color: rgba(255,255,255,.22); }
    .btn-primary { background: var(--gold-ui); border-color: var(--gold-ui); color: #241a04; }
    .btn-primary:hover { background: #f0c05a; border-color: #f0c05a; color: #241a04; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    select.btn { background: var(--panel); color: var(--ink); -webkit-appearance: none; appearance: none; }
    .pending-note { font-family: var(--disp); font-weight: 600; font-size: 12.5px; letter-spacing: .08em;
      text-transform: uppercase; color: var(--gold-ui); border-bottom: 1px solid rgba(232,179,60,.4); padding-bottom: 1px; }

    /* ── tabs: chyron-onderstreping ───────────────────────────── */
    .tabs { position: sticky; top: 0; z-index: 30; display: flex; gap: 22px; overflow-x: auto; scrollbar-width: none;
      background: linear-gradient(var(--page) 88%, transparent); padding: 12px 0 0; margin-bottom: 22px;
      border-bottom: 1px solid var(--hair); }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { font-family: var(--disp); font-weight: 600; font-size: 14px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); padding: 6px 2px 10px; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .tab:hover { color: var(--ink-2); }
    .tab.on { color: var(--ink); border-bottom-color: var(--gold-ui); }

    /* ── secties (geen kaarten: hairline + eyebrow) ───────────── */
    .sect { border-top: 1px solid var(--hair); padding-top: 14px; margin: 30px 0; }
    .sect-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
    .sect-head h3 { margin: 0; font-family: var(--disp); font-weight: 600; font-size: 14px;
      letter-spacing: .16em; text-transform: uppercase; color: var(--ink-2); }
    .sect-head .aside { margin-left: auto; }
    .sect-sub { color: var(--muted); font-size: 13px; margin: 2px 0 12px; max-width: 62ch; }
    .linkbtn { font-family: var(--disp); font-weight: 600; font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--hair); padding-bottom: 1px; }
    .linkbtn:hover { color: var(--ink); }

    /* ── scorebug (signatuur) ─────────────────────────────────── */
    .bug { padding: 26px 0 6px; }
    .bug-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: stretch; }
    .bug-side { display: flex; flex-direction: column; gap: 2px; }
    .bug-side.r { text-align: right; align-items: flex-end; }
    .bug-team { font-family: var(--disp); font-weight: 700; font-size: 15px; letter-spacing: .18em; text-transform: uppercase; }
    .bug-team.g { color: var(--gold-ui); } .bug-team.z { color: var(--silver-ui); }
    .bug-owner { font-family: var(--disp); font-weight: 500; font-size: 12px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted); }
    .bug-score { font-family: var(--disp); font-weight: 600; font-size: clamp(46px, 11vw, 78px); line-height: 1.02;
      letter-spacing: .01em; margin: 4px 0 2px; font-variant-numeric: tabular-nums; }
    .bug-subs { font-size: 13px; color: var(--ink-2); }
    .bug-vs { align-self: center; font-family: var(--disp); font-weight: 600; font-size: 14px; letter-spacing: .2em;
      color: var(--muted); padding: 0 6px; }
    .lead-tag { display: inline-block; font-family: var(--disp); font-weight: 700; font-size: 11px; letter-spacing: .18em;
      text-transform: uppercase; color: #241a04; background: var(--gold-ui); border-radius: 3px; padding: 2px 7px 1px; margin-bottom: 6px; }
    .lead-tag.z { background: var(--silver-ui); color: #10151d; }
    .lead-slot { min-height: 22px; }
    .poss { margin-top: 20px; }
    .poss + .poss { margin-top: 14px; }
    .poss-track { display: flex; gap: 2px; height: 12px; border-radius: 3px; overflow: hidden; }
    .poss-track.slim { height: 6px; }
    .poss-g { background: linear-gradient(90deg, #b8830e, var(--gold-ui)); transition: width .9s cubic-bezier(.2,.7,.2,1); }
    .poss-z { background: linear-gradient(270deg, #9dabc0, var(--silver-ui)); transition: width .9s cubic-bezier(.2,.7,.2,1); }
    .poss-foot { display: flex; justify-content: space-between; gap: 10px; margin-top: 6px;
      font-family: var(--disp); font-weight: 500; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .poss-foot b { color: var(--ink-2); font-weight: 600; }
    .bug-line { margin: 20px auto 0; max-width: 70ch; text-align: center; color: var(--ink-2); font-size: 14px; }

    /* ── kpi-strip: tekstkolommen met hairlines ───────────────── */
    .strip { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--hair);
      border-bottom: 1px solid var(--hair); margin: 26px 0; }
    .strip .cell { padding: 14px 16px; border-left: 1px solid var(--hair); }
    .strip .cell:first-child { border-left: 0; padding-left: 0; }
    .cell .lbl { font-family: var(--disp); font-weight: 600; font-size: 11.5px; letter-spacing: .16em;
      text-transform: uppercase; color: var(--muted); }
    .cell .val { font-family: var(--disp); font-weight: 600; font-size: 27px; margin-top: 3px; line-height: 1.1; }
    .cell .sub { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }
    @media (max-width: 640px) {
      .strip { grid-template-columns: 1fr 1fr; }
      .strip .cell { border-left: 0; padding-left: 0; }
      .strip .cell:nth-child(2n) { border-left: 1px solid var(--hair); padding-left: 16px; }
      .strip .cell:nth-child(n+3) { border-top: 1px solid var(--hair); }
    }
    .up { color: var(--good); } .down { color: var(--bad); }

    /* ── team-identiteit zonder ruis: swatch + woord ──────────── */
    .sw { display: inline-block; width: 9px; height: 9px; border-radius: 2px; vertical-align: 0; flex: none; }
    .sw.g { background: var(--gold-ui); } .sw.z { background: var(--silver-ui); }
    .tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--disp); font-weight: 600;
      font-size: 11.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

    /* ── legenda & grafieken ──────────────────────────────────── */
    .legend { display: flex; gap: 18px; flex-wrap: wrap; margin: 2px 0 10px; }
    .leg { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-2); }
    .leg .k { width: 14px; height: 3px; border-radius: 2px; }
    .leg .k.box { width: 10px; height: 10px; border-radius: 2px; }
    .chart-host { position: relative; width: 100%; }
    .chart-empty { color: var(--muted); font-size: 13px; padding: 16px 0; }
    .gridline { stroke: var(--grid); stroke-width: 1; }
    .axline { stroke: var(--axis); stroke-width: 1.5; }
    .ticktext { fill: var(--muted); font-size: 11px; font-family: var(--body); font-variant-numeric: tabular-nums; }
    .xticktext { fill: var(--muted); font-size: 11px; font-family: var(--body); }
    .endlabel { fill: var(--ink); font-size: 12px; font-weight: 600; font-family: var(--body); }
    .crossline { stroke: #46516a; stroke-width: 1; }
    .tip { position: absolute; top: 6px; left: 0; pointer-events: none; display: none; z-index: 5;
      background: var(--panel-2); border: 1px solid var(--hair); border-radius: 8px; padding: 8px 11px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5); font-size: 12.5px; max-width: 250px; }
    .tip-date { font-family: var(--disp); font-weight: 600; font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .tip-row { display: flex; align-items: center; gap: 7px; margin-top: 3px; white-space: nowrap; }
    .tip-key { width: 12px; height: 3px; border-radius: 2px; flex-shrink: 0; }
    .tip-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .tip-lbl { color: var(--ink-2); }

    /* ── tabellen ─────────────────────────────────────────────── */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.dt { border-collapse: collapse; width: 100%; font-size: 13.5px; }
    .dt th { text-align: left; font-family: var(--disp); font-weight: 600; font-size: 11.5px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted); padding: 7px 10px; border-bottom: 1px solid var(--hair); white-space: nowrap; }
    .dt td { padding: 8px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
    .dt td.num, .dt th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .dt tr:last-child td { border-bottom: 0; }
    .chart-table { margin-top: 12px; display: none; }
    .chart-table.open { display: block; }

    /* ── lijstrijen (leaderboard / teams / race / feed) ───────── */
    .row { display: flex; align-items: center; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--grid); }
    .row:last-child { border-bottom: 0; }
    .rank { font-family: var(--disp); font-weight: 600; font-size: 19px; color: var(--muted); width: 28px;
      text-align: center; flex: none; font-variant-numeric: tabular-nums; }
    .rank.m1 { color: var(--gold-ui); } .rank.m2 { color: var(--silver-ui); } .rank.m3 { color: #b78757; }
    .row-main { flex: 1; }
    .row-name { display: flex; align-items: center; gap: 9px; font-weight: 600; font-size: 14.5px; }
    .row-bar { height: 5px; border-radius: 999px; background: rgba(122,132,153,.15); overflow: hidden; margin-top: 6px; }
    .row-fill { height: 100%; border-radius: 999px; transition: width .7s; }
    .row-nums { text-align: right; flex: none; }
    .row-nums .v { font-family: var(--disp); font-weight: 600; font-size: 18px; font-variant-numeric: tabular-nums; line-height: 1.15; }
    .row-nums .s { font-size: 12px; color: var(--muted); }
    .rankmove { font-family: var(--disp); font-weight: 600; font-size: 11.5px; letter-spacing: .05em; }
    .newmark { font-family: var(--disp); font-weight: 600; font-size: 11px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted); border: 1px solid var(--hair); border-radius: 3px; padding: 1px 6px; }
    .small { font-size: 12px; } .muted { color: var(--muted); } .nowrap { white-space: nowrap; }

    /* ── teams twee kolommen ──────────────────────────────────── */
    .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 0 44px; }
    @media (max-width: 720px) { .teams { grid-template-columns: 1fr; } }
    .team-head { display: flex; align-items: baseline; gap: 10px; padding: 6px 0 4px;
      border-bottom: 1px solid var(--hair); }
    .team-head .t { font-family: var(--disp); font-weight: 700; font-size: 14px; letter-spacing: .16em; text-transform: uppercase; }
    .team-head .o { margin-left: auto; font-family: var(--disp); font-weight: 500; font-size: 12px;
      letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .spark { flex: none; }

    /* ── race meters ──────────────────────────────────────────── */
    .race-top { display: flex; align-items: baseline; gap: 10px; }
    .race-top .v { margin-left: auto; font-family: var(--disp); font-weight: 600; font-size: 15px;
      font-variant-numeric: tabular-nums; color: var(--ink-2); }
    .meter { height: 7px; border-radius: 999px; overflow: hidden; margin-top: 7px; }
    .meter.g { background: rgba(201,133,0,.16); } .meter.z { background: rgba(126,141,163,.16); }
    .meter-fill { height: 100%; border-radius: 999px; transition: width .7s; min-width: 2px; }
    .race-sub { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--muted); margin-top: 6px; }
    .race-item { padding: 12px 0; border-bottom: 1px solid var(--grid); }
    .race-item:last-child { border-bottom: 0; }

    /* ── mini-multiples ───────────────────────────────────────── */
    .minis { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 156px), 1fr)); gap: 10px; }
    .mini { background: var(--panel); border-radius: 10px; padding: 11px 13px; }
    .mini .nm { display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600;
      overflow: hidden; white-space: nowrap; }
    .mini .v { font-family: var(--disp); font-weight: 600; font-size: 20px; margin-top: 4px; }
    .mini .d { font-size: 11.5px; margin-top: 1px; color: var(--muted); }
    .mini .sp { margin-top: 8px; }

    /* ── filters ──────────────────────────────────────────────── */
    .filters { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; margin: 0 0 4px; }
    .segc { display: inline-flex; gap: 14px; }
    .segc button { font-family: var(--disp); font-weight: 600; font-size: 13px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); padding: 4px 1px; border-bottom: 2px solid transparent; }
    .segc button:hover { color: var(--ink-2); }
    .segc button.on { color: var(--ink); border-bottom-color: var(--gold-ui); }
    .filters .sep { width: 1px; height: 16px; background: var(--hair); }

    /* ── formulier ────────────────────────────────────────────── */
    .panel { background: var(--panel); border-radius: 14px; padding: 18px; margin: 18px 0; }
    .frm label { display: block; font-family: var(--disp); font-weight: 600; font-size: 11.5px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0 0 5px; }
    .frm input, .frm select { width: 100%; background: var(--page); color: var(--ink); border: 1px solid var(--hair);
      border-radius: 8px; padding: 9px 11px; font-size: 16px; font-family: var(--body); }
    .frm input:focus, .frm select:focus { outline: 2px solid var(--gold-ui); outline-offset: 0; border-color: transparent; }
    .frm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 170px), 1fr)); gap: 12px; }
    .qrow { display: grid; grid-template-columns: minmax(96px, 1.2fr) 1fr 1fr; gap: 8px; align-items: center;
      padding: 7px 0; border-top: 1px solid var(--grid); }
    .qrow .qn { font-size: 13px; font-weight: 600; display: flex; flex-direction: column; }
    .qrow .qn small { color: var(--muted); font-weight: 400; font-size: 10.5px; }
    .qhead { display: grid; grid-template-columns: minmax(96px, 1.2fr) 1fr 1fr; gap: 8px; padding: 4px 0; }
    .form-foot { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    /* ── mijlpalen-feed ───────────────────────────────────────── */
    .feed-row { display: flex; gap: 14px; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--grid); font-size: 14px; }
    .feed-row:last-child { border-bottom: 0; }
    .feed-date { font-family: var(--disp); font-weight: 600; font-size: 11.5px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); min-width: 58px; flex: none; font-variant-numeric: tabular-nums; }
    .feed-tag { flex: none; }

    /* ── historiek ────────────────────────────────────────────── */
    .hist-date { font-family: var(--disp); font-weight: 600; font-size: 13.5px; letter-spacing: .14em;
      text-transform: uppercase; color: var(--ink-2); margin-bottom: 6px; }
    details.wf { border-top: 1px solid var(--hair); padding: 14px 0 4px; margin: 24px 0; color: var(--ink-2); font-size: 13.5px; }
    details.wf summary { cursor: pointer; font-family: var(--disp); font-weight: 600; font-size: 13px;
      letter-spacing: .14em; text-transform: uppercase; color: var(--ink-2); list-style-position: outside; }
    details.wf ol { margin: 12px 0 4px; padding-left: 20px; }
    details.wf li { margin: 5px 0; }

    /* ── toast & fouten ───────────────────────────────────────── */
    #toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(16px);
      background: var(--panel-2); color: var(--ink); border: 1px solid var(--hair); border-radius: 10px;
      padding: 11px 16px; font-size: 13.5px; opacity: 0; pointer-events: none; transition: all .25s;
      z-index: 90; max-width: min(92vw, 480px); text-align: center; box-shadow: 0 10px 32px rgba(0,0,0,.55); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .errbar { border-left: 3px solid var(--bad); color: #f3b3b3; padding: 10px 14px; font-size: 13.5px; margin: 14px 0; }
  </style>
</head>
<body>
  <div class="app" id="app"><div class="chart-empty">Laden…</div></div>
  <div id="toast" role="status"></div>
  <noscript><p style="color:#fff;padding:20px">Deze app heeft JavaScript nodig.</p></noscript>

  <script>
  "use strict";
  /* ============================== constants ============================== */
  const TARGET = 16_000_000;
  const DATA_URL = "./data.json";
  const C = {
    gold: "#c98500", silver: "#7e8da3",
    goldUi: "#e8b33c", silverUi: "#c7d0dc",
    blue: "#3987e5", red: "#e66767",
    surface: "#0e1116",
  };
  const TEAMNAME = { goud: "Goud", zilver: "Zilver" };
  const VIEW_MILESTONES = [100e3, 250e3, 500e3, 1e6, 2e6, 3e6, 5e6, 8e6, 10e6, TARGET];
  const SUB_MILESTONES = [100, 250, 500, 1000, 2500, 5000, 10000];
  const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ============================== tiny DOM lib ============================ */
  function el(tag, attrs, ...kids) {
    const n = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") n.className = v;
      else if (k === "style") n.style.cssText = v;
      else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
      else n.setAttribute(k, v === true ? "" : v);
    }
    for (const kid of kids.flat(9)) {
      if (kid == null || kid === false) continue;
      n.append(kid instanceof Node ? kid : String(kid));
    }
    return n;
  }
  function sv(tag, attrs, ...kids) {
    const n = document.createElementNS("http://www.w3.org/2000/svg", tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") n.setAttribute("class", v);

  /* ============================== queries ================================ */

    const band = iw / nG;
    const m = series.length;
    const bw = Math.max(3, Math.min(24, (band * .66 - 2 * (m - 1)) / m));
    const groupW = bw * m + 2 * (m - 1);
    function barPath(x, yv) {
      const up = yv <= y0;
      const r = Math.min(4, bw / 2, Math.abs(y0 - yv));
      if (Math.abs(y0 - yv) < 1.2) return `M ${x} ${y0 - .6} h ${bw} v 1.2 h ${-bw} Z`;
      if (up) return `M ${x} ${y0} V ${yv + r} Q ${x} ${yv} ${x + r} ${yv} H ${x + bw - r} Q ${x + bw} ${yv} ${x + bw} ${yv + r} V ${y0} Z`;
      return `M ${x} ${y0} V ${yv - r} Q ${x} ${yv} ${x + r} ${yv} H ${x + bw - r} Q ${x + bw} ${yv} ${x + bw} ${yv - r} V ${y0} Z`;
    }
    const groupsEls = [];
    for (let g = 0; g < nG; g++) {
      const gx = padL + g * band + (band - groupW) / 2;
      const grp = sv("g", {});
      series.forEach((s, si) => {
        const v = cfg.matrix[si][g];
        if (v == null) return;
        grp.append(sv("path", { d: barPath(gx + si * (bw + 2), Y(v)), fill: s.color }));
      });
      svg.append(grp); groupsEls.push(grp);
    }
    for (const i of xTickIdxs(nG, Math.max(3, Math.floor(iw / 68)))) {
      svg.append(sv("text", { class: "xticktext", x: (padL + i * band + band / 2).toFixed(1), y: H - 7, "text-anchor": "middle" }, fmtDate(cfg.dates[i])));
    }
    const tip = el("div", { class: "tip" });
    host.append(svg, tip);
    let curG = -1;
    function showG(g, rectW) {
      if (g === curG) return; curG = g;
      groupsEls.forEach((grp, gi) => grp.setAttribute("opacity", gi === g ? "1" : ".45"));
      tip.textContent = "";
      tip.append(el("div", { class: "tip-date" }, fmtDateWk(cfg.dates[g])));
      series.forEach((s, si) => {
        const v = cfg.matrix[si][g];
        if (v == null) return;
        tip.append(el("div", { class: "tip-row" },
          el("span", { class: "tip-key", style: `background:${s.color}` }),
          el("span", { class: "tip-val" }, fmtSign(v)),
          el("span", { class: "tip-lbl" }, s.label)));
      });
      tip.style.display = "block";
      const tw = tip.offsetWidth;
      const px = (padL + g * band + band / 2) * (rectW / W);
      tip.style.left = Math.max(4, Math.min(rectW - tw - 4, px - tw / 2)) + "px";
    }
    function hideG() { curG = -1; groupsEls.forEach(g => g.setAttribute("opacity", "1")); tip.style.display = "none"; }
    const hit = sv("rect", { x: padL, y: 0, width: Math.max(1, iw), height: H, fill: "transparent" });
    svg.append(hit);
    hit.addEventListener("pointermove", e => {
      const rect = svg.getBoundingClientRect();
      const g = Math.max(0, Math.min(nG - 1, Math.floor((e.clientX - rect.left - padL * (rect.width / W)) / (band * (rect.width / W)))));
      showG(g, rect.width);
    });
    hit.addEventListener("pointerdown", e => {
      const rect = svg.getBoundingClientRect();
      curG = -1;
      showG(Math.max(0, Math.min(nG - 1, Math.floor((e.clientX - rect.left - padL * (rect.width / W)) / (band * (rect.width / W))))), rect.width);
    });
    svg.addEventListener("pointerleave", hideG);
  }

  function drawSpark(host, values, color, h = 40) {
    host.textContent = "";
    const w = Math.max(60, host.clientWidth || 100);
    if (!values || values.length < 2) { host.append(el("div", { class: "chart-empty", style: "padding:4px 0;font-size:11px" }, "nog geen data")); return; }
    const min = Math.min(...values), max = Math.max(...values);
    const span = max - min || 1;
    const X = i => 2 + (i / (values.length - 1)) * (w - 10);
    const Y = v => 3 + (1 - (v - min) / span) * (h - 8);
    const svg = sv("svg", { width: w, height: h, viewBox: `0 0 ${w} ${h}` });
    svg.append(sv("path", { d: pathFrom(values, X, Y), fill: "none", stroke: color, "stroke-width": 1.8, "stroke-linejoin": "round", "stroke-linecap": "round", opacity: .95 }));
    svg.append(sv("circle", { cx: X(values.length - 1).toFixed(1), cy: Y(values[values.length - 1]).toFixed(1), r: 3, fill: color, stroke: C.surface, "stroke-width": 1.5 }));
    host.append(svg);

  function saveForm() {
    const f = state.form;
    if (!f.date) { toast("Kies een datum"); return; }
    const rows = [];
    if (f.mode === "quick") {
      for (const ch of DB.channels) {
        const r = f.quick[ch.id];
        if (!r) continue;
        const subs = parseNum(r.subs), views = parseNum(r.views);
        if (subs == null && views == null) continue;
        if (Number.isNaN(subs) || Number.isNaN(views)) { toast(`Ongeldig getal bij ${ch.name}`); return; }
        if (subs == null || views == null) { toast(`Vul bij ${ch.name} subs én views in`); return; }
        rows.push({ ch, subs, views });
      }
      if (!rows.length) { toast("Niets ingevuld"); return; }
    } else {
      const s = f.single;
      const ch = channelOf(s.channelId);
      const subs = parseNum(s.subs), views = parseNum(s.views);
      if (subs == null || views == null || Number.isNaN(subs) || Number.isNaN(views)) { toast("Vul subs én views in (alleen cijfers)"); return; }
      rows.push({ ch, subs, views });
    }
    const drops = rows.filter(({ ch, subs, views }) => {
      const l = latest(ch.id);
      return l && l.date < f.date && (views < l.views || subs < l.subs);
    });
    if (drops.length && !confirm(`Let op: bij ${drops.map(d => d.ch.name).join(", ")} is de nieuwe waarde lager dan de vorige. Typfout? Klik OK om toch op te slaan.`)) return;
    const ts = Date.parse(f.date + "T00:00:00Z");
    const now = Date.now();
    const entries = rows.map(({ ch, subs, views }, i) => ({ id: now + i, channelId: ch.id, subs, views, date: f.date, timestamp: ts }));
    pending.push(...entries);
    savePending();
    mergeStats();
    state.form = null;
    render();
    toast(`${entries.length} ${entries.length === 1 ? "invoer" : "invoeren"} opgeslagen — klik straks "Export data.json" en push naar GitHub`);
  }
  function deletePending(id) {

    savePending();

  }

        legendEl([{ color: C.gold, label: "Goud" }, { color: C.silver, label: "Zilver" }]),
        host => drawLine(host, {
          dates, endLabels: true, area: true,
          series: [
            { label: "Goud", color: C.gold, values: gVals },
            { label: "Zilver", color: C.silver, values: zVals },
          ],
        }),
        { dates, cols: [{ label: "Goud", values: gVals }, { label: "Zilver", values: zVals }] }),
      section(`Groei per dag — ${mLabel}`, "Gemiddelde groei per dag tussen twee opeenvolgende updates.",
        legendEl([{ color: C.gold, label: "Goud", box: true }, { color: C.silver, label: "Zilver", box: true }]),
        host => drawBars(host, {
          dates: growthDates,
          series: [{ label: "Goud", color: C.gold }, { label: "Zilver", color: C.silver }],
          matrix: [gGrowth, zGrowth],
        }),
        { dates: growthDates, cols: [{ label: "Goud /dag", values: gGrowth }, { label: "Zilver /dag", values: zGrowth }] }),
      section(`Voorsprong — ${mLabel}`, "Boven de nullijn leidt Goud, eronder Zilver.", null,
        host => drawLine(host, {
          dates, showZero: true, diverging: true, endLabels: true,
          series: [{ label: `Voorsprong in ${mLabel}`, color: "#93a0b8", values: diff }],
        }),
        { dates, cols: [{ label: `Voorsprong (${mLabel})`, values: diff }] }),
      leaderboardSection(metric),
    ];
  }
  function leaderboardSection(metric) {
    const last = lastDate();
    const prevDate = ALL_DATES[ALL_DATES.length - 2];
    const rows = DB.channels.map(c => ({
      c, v: valueAt(c.id, last, metric) || 0,
      pv: prevDate ? (valueAt(c.id, prevDate, metric) || 0) : 0,
    })).sort((a, b) => b.v - a.v);
    const prevRank = new Map([...rows].sort((a, b) => b.pv - a.pv).map((r, i) => [r.c.id, i]));
    const maxV = rows[0]?.v || 1;
    return el("section", { class: "sect" },
      el("div", { class: "sect-head" }, el("h3", {}, `Leaderboard — ${metric === "views" ? "views" : "subs"}`)),
      rows.map((r, i) => {
        const move = (prevRank.get(r.c.id) ?? i) - i;
        return el("div", { class: "row" },
          el("span", { class: "rank" + (i < 3 ? ` m${i + 1}` : "") }, i + 1),
          el("div", { class: "row-main" },
            el("div", { class: "row-name" }, r.c.name, teamTag(r.c.team),
              move !== 0 ? el("span", { class: "rankmove " + (move > 0 ? "up" : "down") }, move > 0 ? `▲${move}` : `▼${-move}`) : null),
            el("div", { class: "row-bar" }, el("div", { class: "row-fill", style: `width:${(r.v / maxV * 100).toFixed(1)}%;background:${r.c.team === "goud" ? C.gold : C.silver}` }))),
          el("div", { class: "row-nums" },
            el("div", { class: "v" }, fmtC(r.v)),
            el("div", { class: "s" }, r.v !== r.pv ? fmtSign(r.v - r.pv) + " sinds vorige" : "–")));
      }));
  }

  /* ============================== UI: kanalen tab ========================= */
  function viewChannels() {
    return [raceSection(), minisSection(), headToHeadSection()];
  }
  function raceSection() {
    const last = lastDate();
    const rows = DB.channels.map(c => {
      const v = valueAt(c.id, last, "views") || 0;
      const rate = ratePerDay(c.id, "views");
      const remaining = TARGET - v;
      let eta = null;
      if (v >= TARGET) eta = "Gemonetiseerd! 🎉";
      else if (rate && rate > 0) {
        const days = remaining / rate;
        const etaIso = isoAddDays(last, Math.ceil(days));
        eta = days > 3650 ? "meer dan 10 jaar te gaan" : `nog ± ${fmtInt(Math.ceil(days))} dagen (${days > 300 ? fmtDateY(etaIso) : fmtDate(etaIso)})`;
      }
      return { c, v, rate, eta };
    }).sort((a, b) => b.v - a.v);
    return el("section", { class: "sect" },
      el("div", { class: "sect-head" }, el("h3", {}, `Race naar ${fmtC(TARGET)} views`)),
      el("p", { class: "sect-sub" }, "Monetisatie-doel per kanaal, met een schatting op basis van de groei in de laatste 14 dagen."),
      rows.map(({ c, v, rate, eta }) => el("div", { class: "race-item" },
        el("div", { class: "race-top" },
          el("span", { class: "row-name" }, c.name, teamTag(c.team)),
          el("span", { class: "v" }, `${fmtC(v)} / ${fmtC(TARGET)}`)),
        el("div", { class: "meter " + (c.team === "goud" ? "g" : "z") },
          el("div", { class: "meter-fill", style: `width:${Math.min(100, v / TARGET * 100).toFixed(2)}%;background:${c.team === "goud" ? C.gold : C.silver}` })),
        el("div", { class: "race-sub" },
          el("span", {}, `${(v / TARGET * 100).toFixed(1)}%`),
          el("span", {}, eta || (rate == null ? "nog te weinig data voor een schatting" : "–")),
          el("span", {}, rate ? `+${fmtC(rate)}/dag` : "")))));
  }
  function minisSection() {
    const minis = DB.channels.map(c => {
      const snaps = snapsOf(c.id);
      const l = latest(c.id), p = prevSnap(c.id);
      const sparkHost = el("div", { class: "sp" });
      chartJobs.push(() => { if (sparkHost.isConnected) drawSpark(sparkHost, snaps.map(s => s.views), c.team === "goud" ? C.gold : C.silver, 38); });
      return el("div", { class: "mini" },
        el("div", { class: "nm" }, swatch(c.team), c.name),
        el("div", { class: "v" }, l ? fmtC(l.views) : "–"),
        el("div", { class: "d" }, l && p ? deltaSpan(l.views - p.views, " views") : el("span", { class: "muted" }, l ? `${fmtC(l.subs)} subs` : "—")),
        sparkHost);
    });
    return el("section", { class: "sect" },
      el("div", { class: "sect-head" }, el("h3", {}, "Alle kanalen — views")),
      el("p", { class: "sect-sub" }, "Eén mini-grafiek per kanaal; de kleur is de teamkleur."),
      el("div", { class: "minis" }, minis));
  }
  function headToHeadSection() {
    const selects = el("div", { class: "filters", style: "margin-bottom:12px;gap:10px" },
      el("select", { class: "btn", style: "max-width:44vw", oninput: e => { state.cmpA = e.target.value; render(); } },
        DB.channels.map(c => el("option", { value: c.id, selected: c.id === state.cmpA }, `${c.name} — ${TEAMNAME[c.team]}`))),
      el("span", { class: "eyebrow" }, "vs"),
      el("select", { class: "btn", style: "max-width:44vw", oninput: e => { state.cmpB = e.target.value; render(); } },
        DB.channels.map(c => el("option", { value: c.id, selected: c.id === state.cmpB }, `${c.name} — ${TEAMNAME[c.team]}`))));
    const A = channelOf(state.cmpA), B = channelOf(state.cmpB);
    if (!A || !B) return el("section", { class: "sect" }, el("div", { class: "sect-head" }, el("h3", {}, "Head-to-head")), selects);
    const same = A.id === B.id;
    const firstA = snapsOf(A.id)[0]?.date, firstB = snapsOf(B.id)[0]?.date;
    const start = [firstA, firstB].filter(Boolean).sort()[0];
    const dates = start ? ALL_DATES.filter(d => d >= start) : [];
    const valsA = dates.map(d => valueAt(A.id, d, "views"));
    const valsB = dates.map(d => valueAt(B.id, d, "views"));
    const vA = latest(A.id)?.views ?? null, vB = latest(B.id)?.views ?? null;
    const rA = ratePerDay(A.id, "views"), rB = ratePerDay(B.id, "views");
    let verdict = null;
    if (!same && vA != null && vB != null && rA != null && rB != null) {
      const [leadC, trailC] = vA >= vB ? [{ c: A, v: vA, r: rA }, { c: B, v: vB, r: rB }] : [{ c: B, v: vB, r: rB }, { c: A, v: vA, r: rA }];
      if (trailC.r > leadC.r) {
        const days = (leadC.v - trailC.v) / (trailC.r - leadC.r);
        verdict = days < 3650 ? `${trailC.c.name} groeit sneller en haalt ${leadC.c.name} bij dit tempo in rond ${fmtDateWk(isoAddDays(lastDate(), Math.ceil(days)))}.`
          : `${trailC.c.name} groeit iets sneller, maar inhalen duurt nog jaren.`;
      } else {
        verdict = `${leadC.c.name} leidt én groeit sneller — het gat wordt groter.`;
      }
    }
    const statCell = (ch, v, r, color) => el("div", { class: "cell" },
      el("div", { class: "lbl", style: `border-bottom:2px solid ${color};display:inline-block;padding-bottom:2px` }, ch.name),
      el("div", { class: "val" }, v == null ? "–" : fmtC(v)),
      el("div", { class: "sub" }, r != null ? `+${fmtC(r)} per dag (14 d)` : "nog geen groeidata"));
    const host = el("div", { class: "chart-host" });
    chartJobs.push(() => {
      if (!host.isConnected) return;
      drawLine(host, {
        dates, endLabels: true,
        series: [
          { label: A.name, color: C.blue, values: valsA },
          { label: B.name, color: C.red, values: valsB },
        ],
      });
    });
    return el("section", { class: "sect" },
      el("div", { class: "sect-head" }, el("h3", {}, "Head-to-head")),
      el("p", { class: "sect-sub" }, "Kies twee kanalen en vergelijk hun views-race."),
      selects,
      same ? el("p", { class: "chart-empty" }, "Kies twee verschillende kanalen.") : [
        el("div", { class: "strip", style: "grid-template-columns:1fr 1fr;margin:14px 0" }, statCell(A, vA, rA, C.blue), statCell(B, vB, rB, C.red)),
        legendEl([{ color: C.blue, label: A.name }, { color: C.red, label: B.name }]),
        host,
        verdict ? el("p", { class: "sect-sub", style: "margin-top:12px" }, verdict) : null,
      ]);
  }

  /* ============================== UI: mijlpalen tab ======================= */
  function viewMilestones() {
    const { jump, fast, first1m, streak, flips } = records();
    const ms = milestones();
    const shown = state.msAll ? ms : ms.slice(0, 15);
    const recStrip = el("div", { class: "strip" },
      el("div", { class: "cell" }, el("div", { class: "lbl" }, "Grootste sprong"),
        el("div", { class: "val" }, jump ? `+${fmtC(jump.delta)}` : "–"),
        el("div", { class: "sub" }, jump ? `${jump.ch.name} · ${fmtDate(jump.date)} (± +${fmtC(jump.delta / jump.days)}/dag)` : "")),
      el("div", { class: "cell" }, el("div", { class: "lbl" }, "Snelste groeier nu"),
        el("div", { class: "val" }, fast ? `+${fmtC(fast.rate)}/dag` : "–"),
        el("div", { class: "sub" }, fast ? fast.ch.name : "")),
      el("div", { class: "cell" }, el("div", { class: "lbl" }, "Eerste naar 1M views"),
        el("div", { class: "val" }, first1m ? first1m.ch.name : "nog niemand"),
        el("div", { class: "sub" }, first1m ? `op ${fmtDate(first1m.date)}` : "")),
      el("div", { class: "cell" }, el("div", { class: "lbl" }, "Huidige leiding"),
        el("div", { class: "val" }, streak ? `${TEAMNAME[streak.team]} — ${streak.days} d` : "–"),
        el("div", { class: "sub" }, streak ? `onafgebroken sinds ${fmtDate(streak.since)}` : "")));
    const flipRows = flips.map((f, i) => el("div", { class: "feed-row" },
      el("span", { class: "feed-date" }, fmtDate(f.date)),
      el("span", { class: "feed-tag" }, teamTag(f.team)),
      el("span", {}, i === 0 ? `Start — ${TEAMNAME[f.team]} pakt als eerste de leiding` : `${TEAMNAME[f.team]} neemt de leiding over`)));
    return [
      el("section", { class: "sect" },
        el("div", { class: "sect-head" }, el("h3", {}, "Records")), recStrip),
      el("section", { class: "sect" },
        el("div", { class: "sect-head" }, el("h3", {}, "Leiderschap")),
        flips.length ? flipRows : el("p", { class: "chart-empty" }, "Nog geen data.")),
      el("section", { class: "sect" },
        el("div", { class: "sect-head" }, el("h3", {}, "Mijlpalen"),
          ms.length > 15 ? el("span", { class: "aside" }, el("button", { class: "linkbtn", onclick: () => { state.msAll = !state.msAll; render(); } }, state.msAll ? "minder" : `alles (${ms.length})`)) : null),
        shown.length ? shown.map(m => el("div", { class: "feed-row" },
          el("span", { class: "feed-date" }, fmtDate(m.date)),
          el("span", { class: "feed-tag" }, teamTag(m.team)),
          el("span", {}, m.text))) : el("p", { class: "chart-empty" }, "Nog geen mijlpalen.")),
    ];
  }

  /* ============================== UI: historiek tab ======================= */
  function viewHistory() {
    const pendingIds = new Set(pending.map(p => p.id));
    const byDate = new Map();
    for (const [chId, snaps] of SNAP) for (const s of snaps) {
      if (!byDate.has(s.date)) byDate.set(s.date, []);
      byDate.get(s.date).push({ chId, ...s });
    }
    const dates = [...byDate.keys()].sort().reverse();
    const pendingSect = pending.length ? el("section", { class: "sect" },
      el("div", { class: "sect-head" }, el("h3", {}, "Lokale invoer — nog niet gepusht")),
      el("p", { class: "sect-sub" }, "Deze staan alleen op dit toestel. Klik \"Export data.json\", vervang het bestand in GitHub en push — daarna verdwijnen ze hier vanzelf."),
      pending.map(p => {
        const ch = channelOf(p.channelId);
        return el("div", { class: "row" },
          el("div", { class: "row-main" },
            el("div", { class: "row-name" }, ch ? [swatch(ch.team), " " + ch.name] : p.channelId),
            el("div", { class: "small muted" }, fmtDate(p.date))),
          el("div", { class: "row-nums" },
            el("div", { class: "v" }, fmtInt(p.views)),
            el("div", { class: "s" }, `${fmtInt(p.subs)} subs`)),
          el("button", { class: "btn btn-sm", onclick: () => deletePending(p.id) }, "Verwijder"));
      })) : null;
    const wf = el("details", { class: "wf" },
      el("summary", {}, "Hoe werkt het updaten?"),
      el("ol", {},
        el("li", {}, "Klik ", el("b", {}, "Nieuwe cijfers"), " en vul de nieuwe stats in (alle kanalen in één keer kan)."),
        el("li", {}, "Klik ", el("b", {}, "Export data.json"), " — je downloadt het nieuwe databestand."),
        el("li", {}, "Vervang ", el("b", {}, "dashboard/data.json"), " in GitHub en push (of upload via de GitHub-website)."),
        el("li", {}, "Netlify deployt automatisch (± 1 min). De ander klikt Herladen en ziet alles.")),
      el("p", { class: "small muted" }, "Je invoer blijft lokaal bewaard tot de push gelukt is — je raakt niets kwijt als je de pagina sluit."));
    const dateSects = dates.map(d => {
      const rows = byDate.get(d).map(r => ({ ...r, ch: channelOf(r.chId) }))
        .sort((a, b) => (b.views) - (a.views));
      return el("section", { class: "sect" },
        el("div", { class: "hist-date" }, fmtDateLong(d)),
        el("div", { class: "table-scroll" }, el("table", { class: "dt" },
          el("thead", {}, el("tr", {}, el("th", {}, "Kanaal"), el("th", { class: "num" }, "Views"), el("th", { class: "num" }, "Δ views"), el("th", { class: "num" }, "Subs"), el("th", { class: "num" }, "Δ subs"))),
          el("tbody", {}, rows.map(r => {
            const prevList = snapsOf(r.chId).filter(s => s.date < d);
            const prev = prevList[prevList.length - 1];
            return el("tr", {},
              el("td", {}, swatch(r.ch.team), " " + r.ch.name + (pendingIds.has(r.id) ? " · lokaal" : "")),
              el("td", { class: "num" }, fmtInt(r.views)),
              el("td", { class: "num" }, prev ? deltaSpan(r.views - prev.views) : el("span", { class: "muted" }, "–")),
              el("td", { class: "num" }, fmtInt(r.subs)),
              el("td", { class: "num" }, prev ? deltaSpan(r.subs - prev.subs) : el("span", { class: "muted" }, "–")));
          })))));
    });
    return [pendingSect, wf, dateSects.length ? dateSects : el("section", { class: "sect" }, el("p", { class: "chart-empty" }, "Nog geen data — voer de eerste stats in.")) ];
  }

  /* ============================== render ================================= */
  function render() {
    chartJobs = [];
    const app = document.getElementById("app");
    app.textContent = "";
    app.append(header());
    if (state.err) app.append(el("div", { class: "errbar" }, state.err + " ",
      el("button", { class: "btn btn-sm", onclick: () => reload(true) }, "Opnieuw proberen")));
    app.append(actionsRow());
    const fp = formPanel();
    if (fp) app.append(fp);
    app.append(tabBar());
    const view = { battle: viewBattle, charts: viewCharts, channels: viewChannels, milestones: viewMilestones, history: viewHistory }[state.tab] || viewBattle;
    for (const node of [view()].flat(9)) if (node) app.append(node);
    for (const job of chartJobs) job();
  }
  window.addEventListener("resize", debounce(() => { for (const job of chartJobs) job(); }, 180));
  window.addEventListener("error", e => {
    const app = document.getElementById("app");
    if (app && !app.querySelector(".errbar.js")) app.prepend(el("div", { class: "errbar js" }, "Er ging iets mis: " + (e.message || "onbekende fout")));
  });
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && Date.now() - lastFetch > 5 * 60e3 && !state.form && !pending.length) reload(false);
  });

  /* ============================== init =================================== */
  (async function init() {
    const hash = (location.hash || "").slice(1);
    if (TABS.some(([id]) => id === hash)) state.tab = hash;
    pending = loadPending();
    try {
      await loadData();
    } catch (e) {
      state.err = "Kon data.json niet laden (" + e.message + "). Controleer of het bestand bestaat.";
      mergeStats();
    }
    if (hash === "invoer") state.form = newFormState();
    render();
  })();
  </script>
</body>
</html>
