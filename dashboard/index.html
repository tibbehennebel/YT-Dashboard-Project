<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>YouTube Battle — Goud vs Zilver</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YT Battle">
  <meta name="theme-color" content="#0b0e14">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <style>
    :root {
      --page: #0b0e14;
      --card: #151a23;
      --card-2: #1c2331;
      --border: rgba(255,255,255,.07);
      --ink: #f2f5fa;
      --ink-2: #aab3c6;
      --muted: #78829a;
      --grid: #232b3a;
      --axis: #39435c;
      --gold: #c98500;       /* gevalideerde mark-kleur (grafieken) */
      --gold-ui: #f2c14e;    /* heldere ui-chip / fill */
      --silver: #7e8da3;     /* gevalideerde mark-kleur (grafieken) */
      --silver-ui: #c3cddb;
      --good: #3fd06c;
      --bad: #f27d7d;
      --accent: #8b7cf7;
      --accent-ink: #17122e;
    }
    * { box-sizing: border-box; min-width: 0; }
    html { background: var(--page); -webkit-text-size-adjust: 100%; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0; background: var(--page); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .app { max-width: 1080px; margin: 0 auto; padding: 14px 14px 60px;
      padding-left: max(14px, env(safe-area-inset-left));
      padding-right: max(14px, env(safe-area-inset-right));
      padding-top: max(14px, env(safe-area-inset-top)); }
    svg { display: block; max-width: 100%; }
    button { font: inherit; color: inherit; }

    /* header */
    .hdr { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin: 6px 0 14px; }
    .hdr h1 { font-size: 22px; margin: 0; letter-spacing: -.02em; display: flex; align-items: center; gap: 8px; }
    .hdr .sub { color: var(--muted); font-size: 13px; width: 100%; margin-top: -4px; }
    .hdr-spacer { flex: 1; }
    .leader-chip { font-size: 13px; font-weight: 700; padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--card); white-space: nowrap; }

    /* buttons & bars */
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .btn { border: 1px solid var(--border); background: var(--card); color: var(--ink-2);
      border-radius: 12px; padding: 9px 14px; font-size: 14px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px; transition: background .15s, color .15s; }
    .btn:hover { background: var(--card-2); color: var(--ink); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
    .btn-primary:hover { background: #a094ff; color: var(--accent-ink); }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 9px; }
    .pending-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
      color: #ffd48a; background: rgba(242,193,78,.12); border: 1px solid rgba(242,193,78,.35);
      border-radius: 12px; padding: 9px 12px; }

    /* tabs */
    .tabs { position: sticky; top: 0; z-index: 30; display: flex; gap: 6px; flex-wrap: wrap;
      padding: 8px 0 10px; margin-bottom: 12px; background: linear-gradient(var(--page) 85%, transparent); }
    .tab { border: 1px solid var(--border); background: var(--card); color: var(--ink-2);
      border-radius: 999px; padding: 8px 14px; font-size: 13.5px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .tab.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

    /* cards */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .card h3 { margin: 0; font-size: 15.5px; display: flex; align-items: center; gap: 7px; }
    .card-head { display: flex; align-items: center; gap: 10px; justify-content: space-between; margin-bottom: 4px; }
    .card-sub { color: var(--muted); font-size: 12.5px; margin: 2px 0 10px; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr)); gap: 14px; }

    /* scoreboard */
    .score { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; margin-bottom: 14px; }
    .side { position: relative; border-radius: 14px; padding: 16px 14px 13px; background: var(--card-2);
      border: 1px solid var(--border); border-top: 3px solid var(--silver); text-align: center; }
    .side.gold { border-top-color: var(--gold-ui); }
    .side.silver { border-top-color: var(--silver-ui); }
    .side .tname { font-size: 13px; font-weight: 700; color: var(--ink-2); letter-spacing: .04em; }
    .side .owner { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .side .big { font-size: clamp(26px, 7vw, 40px); font-weight: 750; letter-spacing: -.02em; margin: 6px 0 0; }
    .side .unit { font-size: 12px; color: var(--muted); }
    .side .subrow { font-size: 13px; color: var(--ink-2); margin-top: 6px; }
    .crown { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800;
      padding: 3px 10px; border-radius: 999px; background: var(--gold-ui); color: #3a2b03; white-space: nowrap; }
    .crown.s { background: var(--silver-ui); color: #1c2430; }
    .vs { align-self: center; font-weight: 800; font-size: 14px; color: var(--muted);
      border: 1px solid var(--border); background: var(--card-2); border-radius: 999px; width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center; }

    /* battle share bar */
    .share { margin: 12px 0 4px; }
    .share-head { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-2); margin-bottom: 5px; }
    .share-head b { color: var(--ink); font-variant-numeric: tabular-nums; }
    .share-track { display: flex; gap: 2px; height: 26px; border-radius: 999px; overflow: hidden; }
    .share-track.slim { height: 14px; }
    .seg { display: flex; align-items: center; justify-content: center; font-size: 11.5px; font-weight: 800; transition: width .6s; }
    .seg.g { background: linear-gradient(90deg, #d9a32e, var(--gold-ui)); color: #3a2b03; }
    .seg.z { background: linear-gradient(90deg, #9aa7ba, var(--silver-ui)); color: #1c2430; }

    /* KPI tiles */
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 160px), 1fr)); gap: 10px; margin-bottom: 14px; }
    .kpi { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
    .kpi .lbl { font-size: 12px; color: var(--muted); }
    .kpi .val { font-size: 23px; font-weight: 700; letter-spacing: -.01em; margin-top: 3px; }
    .kpi .sub { font-size: 12px; color: var(--ink-2); margin-top: 3px; }
    .up { color: var(--good); } .down { color: var(--bad); }

    /* legend & charts */
    .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 2px 0 8px; }
    .leg { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-2); }
    .leg .sw { width: 14px; height: 3px; border-radius: 2px; }
    .leg .sw.box { width: 10px; height: 10px; border-radius: 3px; }
    .chart-host { position: relative; width: 100%; }
    .chart-empty { color: var(--muted); font-size: 13px; font-style: italic; padding: 18px 0; }
    .gridline { stroke: var(--grid); stroke-width: 1; }
    .axline { stroke: var(--axis); stroke-width: 1.5; }
    .ticktext { fill: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
    .xticktext { fill: var(--muted); font-size: 11px; }
    .endlabel { fill: var(--ink); font-size: 12px; font-weight: 600; }
    .crossline { stroke: #4a5570; stroke-width: 1; }
    .tip { position: absolute; top: 6px; left: 0; pointer-events: none; display: none; z-index: 5;
      background: #0e1219; border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,.45); font-size: 12.5px; max-width: 240px; }
    .tip-date { color: var(--muted); font-size: 11.5px; margin-bottom: 4px; }
    .tip-row { display: flex; align-items: center; gap: 7px; margin-top: 2px; white-space: nowrap; }
    .tip-key { width: 12px; height: 3px; border-radius: 2px; flex-shrink: 0; }
    .tip-val { font-weight: 700; font-variant-numeric: tabular-nums; }
    .tip-lbl { color: var(--ink-2); }

    /* tables */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.dt { border-collapse: collapse; width: 100%; font-size: 13px; }
    .dt th { text-align: left; color: var(--muted); font-size: 11.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .05em; padding: 6px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
    .dt td { padding: 7px 10px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
    .dt td.num, .dt th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .dt tr:last-child td { border-bottom: 0; }
    .chart-table { margin-top: 10px; display: none; }
    .chart-table.open { display: block; }

    /* leaderboard */
    .lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 12px; }
    .lb-row.top { background: var(--card-2); border: 1px solid var(--border); }
    .lb-row + .lb-row { margin-top: 6px; }
    .lb-rank { width: 26px; text-align: center; font-weight: 800; font-size: 15px; color: var(--muted); flex-shrink: 0; }
    .lb-main { flex: 1; }
    .lb-name { display: flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 650; margin-bottom: 4px; }
    .lb-bar { height: 6px; border-radius: 999px; background: rgba(126,141,163,.14); overflow: hidden; }
    .lb-fill { height: 100%; border-radius: 999px; transition: width .6s; }
    .lb-nums { text-align: right; flex-shrink: 0; }
    .lb-nums .v { font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
    .lb-nums .s { font-size: 11.5px; color: var(--muted); }
    .chip { font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
    .chip.g { background: rgba(242,193,78,.15); color: var(--gold-ui); }
    .chip.z { background: rgba(195,205,219,.13); color: var(--silver-ui); }
    .chip.new { background: rgba(139,124,247,.15); color: #b9b0ff; }
    .rankmove { font-size: 11px; font-weight: 700; }

    /* team detail rows */
    .trow { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--grid); }
    .trow:first-of-type { border-top: 0; }
    .trow .nm { flex: 1; font-size: 13.5px; font-weight: 600; }
    .trow .vals { text-align: right; }
    .trow .vals .v { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .trow .vals .s { font-size: 11.5px; color: var(--muted); }
    .trow .spark { flex-shrink: 0; }

    /* race meters */
    .race-row { padding: 10px 0; border-top: 1px solid var(--grid); }
    .race-row:first-of-type { border-top: 0; padding-top: 2px; }
    .race-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
    .race-top .nm { font-weight: 650; font-size: 13.5px; flex: 1; }
    .race-top .v { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--ink-2); }
    .meter { height: 10px; border-radius: 999px; overflow: hidden; }
    .meter.g { background: rgba(201,133,0,.18); } .meter.z { background: rgba(126,141,163,.18); }
    .meter-fill { height: 100%; border-radius: 999px; transition: width .7s; min-width: 2px; }
    .race-sub { display: flex; justify-content: space-between; gap: 8px; font-size: 11.5px; color: var(--muted); margin-top: 5px; }

    /* small multiples */
    .minis { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 158px), 1fr)); gap: 10px; }
    .mini { background: var(--card-2); border: 1px solid var(--border); border-radius: 13px; padding: 10px 12px; }
    .mini .nm { font-size: 12.5px; font-weight: 650; display: flex; gap: 5px; align-items: center; overflow: hidden; white-space: nowrap; }
    .mini .v { font-size: 17px; font-weight: 750; margin-top: 3px; }
    .mini .d { font-size: 11px; margin-top: 1px; }
    .mini .sp { margin-top: 6px; }

    /* segmented controls / filters */
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .segc { display: inline-flex; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 3px; gap: 2px; }
    .segc button { border: 0; background: transparent; color: var(--ink-2); font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 9px; cursor: pointer; }
    .segc button.on { background: var(--accent); color: var(--accent-ink); }

    /* form */
    .frm label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 4px; }
    .frm input, .frm select { width: 100%; background: var(--card-2); color: var(--ink); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 11px; font-size: 16px; }
    .frm input:focus, .frm select:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: transparent; }
    .frm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 170px), 1fr)); gap: 10px; }
    .qrow { display: grid; grid-template-columns: minmax(90px, 1.2fr) 1fr 1fr; gap: 8px; align-items: center; padding: 6px 0; border-top: 1px solid var(--grid); }
    .qrow .qn { font-size: 12.5px; font-weight: 600; display: flex; flex-direction: column; }
    .qrow .qn small { color: var(--muted); font-weight: 400; font-size: 10.5px; }
    .form-foot { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    /* milestones */
    .ms-row { display: flex; gap: 10px; align-items: baseline; padding: 8px 0; border-top: 1px solid var(--grid); font-size: 13.5px; }
    .ms-row:first-of-type { border-top: 0; }
    .ms-row .d { color: var(--muted); font-size: 12px; white-space: nowrap; min-width: 64px; font-variant-numeric: tabular-nums; }
    .rec { background: var(--card-2); border: 1px solid var(--border); border-radius: 13px; padding: 12px 14px; }
    .recs { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 210px), 1fr)); gap: 10px; }
    .rec .t { font-size: 12px; color: var(--muted); }
    .rec .v { font-size: 16px; font-weight: 700; margin-top: 3px; }
    .rec .s { font-size: 12px; color: var(--ink-2); margin-top: 2px; }

    /* history */
    .hist-date { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    details.wf { border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; margin-bottom: 14px; background: var(--card); color: var(--ink-2); font-size: 13.5px; }
    details.wf summary { cursor: pointer; font-weight: 650; color: var(--ink); }
    details.wf ol { margin: 10px 0 2px; padding-left: 20px; }
    details.wf li { margin: 4px 0; }

    /* toast + error */
    #toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: #0e1219; color: var(--ink); border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 16px; font-size: 13.5px; opacity: 0; pointer-events: none; transition: all .25s;
      z-index: 90; max-width: min(92vw, 480px); text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.5); }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .errbar { background: rgba(240,90,90,.12); border: 1px solid rgba(240,90,90,.4); color: #ffb9b9;
      border-radius: 12px; padding: 12px 14px; font-size: 13.5px; margin-bottom: 12px; }

    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .nowrap { white-space: nowrap; }
    @media (max-width: 560px) {
      .score { grid-template-columns: 1fr; }
      .vs { display: none; }
      .side .big { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app"><div class="chart-empty">Laden…</div></div>
  <div id="toast" role="status"></div>
  <noscript><p style="color:#fff;padding:20px">Deze app heeft JavaScript nodig.</p></noscript>

  <script>
  "use strict";
  /* ============================== constants ============================== */
  const TARGET = 16_000_000;
  const DATA_URL = "./data.json";
  const C = {
    gold: "#c98500", silver: "#7e8da3",
    goldUi: "#f2c14e", silverUi: "#c3cddb",
    blue: "#3987e5", red: "#e66767",
    good: "#3fd06c", bad: "#f27d7d",
    card: "#151a23",
  };
  const MEDAL = { goud: "🥇", zilver: "🥈" };
  const TEAMNAME = { goud: "Goud", zilver: "Zilver" };
  const VIEW_MILESTONES = [100e3, 250e3, 500e3, 1e6, 2e6, 3e6, 5e6, 8e6, 10e6, TARGET];
  const SUB_MILESTONES = [100, 250, 500, 1000, 2500, 5000, 10000];

  /* ============================== tiny DOM lib ============================ */
  function el(tag, attrs, ...kids) {
    const n = document.createElement(tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") n.className = v;
      else if (k === "style") n.style.cssText = v;
      else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
      else n.setAttribute(k, v === true ? "" : v);
    }
    for (const kid of kids.flat(9)) {
      if (kid == null || kid === false) continue;
      n.append(kid instanceof Node ? kid : String(kid));
    }
    return n;
  }
  function sv(tag, attrs, ...kids) {
    const n = document.createElementNS("http://www.w3.org/2000/svg", tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") n.setAttribute("class", v);
      else if (k.startsWith("on")) n.addEventListener(k.slice(2), v);
      else n.setAttribute(k, v);
    }
    for (const kid of kids.flat(9)) { if (kid != null && kid !== false) n.append(kid instanceof Node ? kid : String(kid)); }
    return n;
  }
  const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };
  let toastT;
  function toast(msg, ms = 3200) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove("show"), ms);
  }

  /* ============================== formatting ============================= */
  function trimZeros(s) { return s.includes(".") ? s.replace(/0+$/, "").replace(/\.$/, "") : s; }
  function fmtC(n) { // compact: 8,06M / 13,3K / 482
    if (n == null || !isFinite(n)) return "–";
    const sign = n < 0 ? "-" : ""; n = Math.abs(n);
    let s;
    if (n >= 1e6) s = trimZeros((n / 1e6).toFixed(n >= 10e6 ? 1 : 2)) + "M";
    else if (n >= 1e3) s = trimZeros((n / 1e3).toFixed(n >= 100e3 ? 0 : 1)) + "K";
    else s = String(Math.round(n));
    return sign + s.replace(".", ",");
  }
  const fmtInt = n => n == null || !isFinite(n) ? "–" : Math.round(n).toLocaleString("nl-NL");
  const fmtSign = n => (n > 0 ? "+" : "") + fmtC(n);
  const dayMs = 86400e3;
  const isoAddDays = (iso, d) => { const t = new Date(iso + "T00:00:00Z"); t.setUTCDate(t.getUTCDate() + d); return t.toISOString().slice(0, 10); };
  const daysBetween = (a, b) => Math.round((Date.parse(b + "T00:00:00Z") - Date.parse(a + "T00:00:00Z")) / dayMs);
  const fmtDate = iso => new Date(iso + "T12:00:00").toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
  const fmtDateY = iso => new Date(iso + "T12:00:00").toLocaleDateString("nl-NL", { day: "numeric", month: "short", year: "numeric" });
  const fmtDateWk = iso => new Date(iso + "T12:00:00").toLocaleDateString("nl-NL", { weekday: "short", day: "numeric", month: "short" });
  const fmtDateLong = iso => new Date(iso + "T12:00:00").toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  /* ============================== state & data ============================ */
  const state = {
    tab: "battle", metric: "views", range: "all",
    cmpA: null, cmpB: null,
    form: null, msAll: false, err: null,
  };
  let FETCHED = { channels: [], stats: [] };
  let pending = [];
  let DB = { channels: [], stats: [] };
  let SNAP = new Map();      // channelId -> [{date, ts, subs, views, id}] gededupliceerd per datum
  let ALL_DATES = [];
  let lastFetch = 0;
  let chartJobs = [];

  function loadPending() {
    try { return JSON.parse(localStorage.getItem("ytbattle_pending_v1") || "[]"); } catch { return []; }
  }
  function savePending() {
    try { localStorage.setItem("ytbattle_pending_v1", JSON.stringify(pending)); } catch {}
  }
  function mergeStats() {
    DB.channels = FETCHED.channels;
    DB.stats = [...FETCHED.stats, ...pending].sort((a, b) => a.timestamp - b.timestamp || a.id - b.id);
    rebuildDerived();
  }
  function rebuildDerived() {
    SNAP = new Map(DB.channels.map(c => [c.id, []]));
    const byKey = new Map();
    for (const s of DB.stats) if (SNAP.has(s.channelId)) byKey.set(s.channelId + "|" + s.date, s);
    for (const s of byKey.values()) SNAP.get(s.channelId).push({ date: s.date, ts: s.timestamp, subs: s.subs, views: s.views, id: s.id });
    for (const arr of SNAP.values()) arr.sort((a, b) => a.date.localeCompare(b.date));
    ALL_DATES = [...new Set(DB.stats.filter(s => SNAP.has(s.channelId)).map(s => s.date))].sort();
    if (!state.cmpA || !SNAP.has(state.cmpA)) state.cmpA = topChannel("zilver");
    if (!state.cmpB || !SNAP.has(state.cmpB)) state.cmpB = topChannel("goud");
  }
  async function loadData() {
    const r = await fetch(DATA_URL + "?nocache=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    FETCHED = { channels: data.channels || [], stats: data.stats || [] };
    const ids = new Set(FETCHED.stats.map(s => s.id));
    pending = pending.filter(p => !ids.has(p.id));
    savePending();
    mergeStats();
    lastFetch = Date.now();
    state.err = null;
  }

  /* ============================== queries ================================ */
  const teamChannels = team => DB.channels.filter(c => c.team === team);
  const lastDate = () => ALL_DATES[ALL_DATES.length - 1] || null;
  function snapsOf(chId) { return SNAP.get(chId) || []; }
  function latest(chId) { const a = snapsOf(chId); return a.length ? a[a.length - 1] : null; }
  function prevSnap(chId) { const a = snapsOf(chId); return a.length > 1 ? a[a.length - 2] : null; }
  function valueAt(chId, dateIso, metric) {
    let v = null;
    for (const s of snapsOf(chId)) { if (s.date <= dateIso) v = s[metric]; else break; }
    return v;
  }
  function teamTotal(team, metric, dateIso) {
    dateIso = dateIso || lastDate();
    if (!dateIso) return 0;
    return teamChannels(team).reduce((acc, c) => acc + (valueAt(c.id, dateIso, metric) || 0), 0);
  }
  function ratePerDay(chId, metric, windowDays = 14) {
    const a = snapsOf(chId);
    if (a.length < 2) return null;
    const last = a[a.length - 1];
    const cutoff = isoAddDays(last.date, -windowDays);
    let base = a[0];
    for (const s of a) { if (s.date <= cutoff) base = s; else break; }
    if (base.date === last.date) base = a[0];
    const days = (last.ts - base.ts) / dayMs;
    if (days <= 0) return null;
    return (last[metric] - base[metric]) / days;
  }
  function teamRate(team, metric) {
    let sum = 0, any = false;
    for (const c of teamChannels(team)) { const r = ratePerDay(c.id, metric); if (r != null) { sum += r; any = true; } }
    return any ? sum : null;
  }
  function topChannel(team) {
    const list = teamChannels(team).map(c => ({ id: c.id, v: latest(c.id)?.views || 0 })).sort((a, b) => b.v - a.v);
    return list[0]?.id || null;
  }
  function filteredDates() {
    if (state.range === "all" || !ALL_DATES.length) return ALL_DATES;
    const cutoff = isoAddDays(lastDate(), -Number(state.range));
    const d = ALL_DATES.filter(x => x >= cutoff);
    return d.length >= 2 ? d : ALL_DATES.slice(-2);
  }
  function channelOf(id) { return DB.channels.find(c => c.id === id); }

  /* ============================== analytics ============================== */
  function diffSeries(metric, dates) {
    return dates.map(d => teamTotal("goud", metric, d) - teamTotal("zilver", metric, d));
  }
  function leadHistory() { // wissels van de leiding (views)
    const dates = ALL_DATES, out = [];
    let cur = 0;
    for (let i = 0; i < dates.length; i++) {
      const diff = teamTotal("goud", "views", dates[i]) - teamTotal("zilver", "views", dates[i]);
      const s = Math.sign(diff);
      if (s !== 0 && s !== cur) { out.push({ date: dates[i], team: s > 0 ? "goud" : "zilver" }); cur = s; }
    }
    return out;
  }
  function milestones() {
    const out = [];
    for (const ch of DB.channels) {
      const snaps = snapsOf(ch.id);
      if (!snaps.length) continue;
      out.push({ date: snaps[0].date, emoji: "🐣", text: `${ch.name} deed voor het eerst mee`, team: ch.team, sort: 0 });
      for (const t of VIEW_MILESTONES) {
        const hit = snaps.find(s => s.views >= t);
        if (hit) out.push({
          date: hit.date, sort: t, team: ch.team,
          emoji: t >= TARGET ? "🎉" : t >= 10e6 ? "🌟" : t >= 5e6 ? "💥" : t >= 1e6 ? "🚀" : "✨",
          text: t >= TARGET ? `${ch.name} haalde ${fmtC(t)} views — GEMONETISEERD! 💰` : `${ch.name} passeerde ${fmtC(t)} views`,
        });
      }
      for (const t of SUB_MILESTONES) {
        const hit = snaps.find(s => s.subs >= t);
        if (hit) out.push({ date: hit.date, sort: t, team: ch.team, emoji: t >= 10000 ? "🏆" : "👥", text: `${ch.name} passeerde ${fmtC(t)} subs` });
      }
    }
    return out.sort((a, b) => b.date.localeCompare(a.date) || b.sort - a.sort);
  }
  function records() {
    let jump = null; // grootste sprong in één update
    let fast = null; // snelste groeier nu
    let first1m = null;
    for (const ch of DB.channels) {
      const a = snapsOf(ch.id);
      for (let i = 1; i < a.length; i++) {
        const d = a[i].views - a[i - 1].views;
        if (!jump || d > jump.delta) jump = { ch, delta: d, date: a[i].date, days: Math.max(1, daysBetween(a[i - 1].date, a[i].date)) };
      }
      const r = ratePerDay(ch.id, "views");
      if (r != null && (!fast || r > fast.rate)) fast = { ch, rate: r };
      const hit = a.find(s => s.views >= 1e6);
      if (hit && (!first1m || hit.date < first1m.date)) first1m = { ch, date: hit.date };
    }
    const flips = leadHistory();
    const lastFlip = flips[flips.length - 1] || null;
    const streak = lastFlip && lastDate() ? { team: lastFlip.team, days: daysBetween(lastFlip.date, lastDate()), since: lastFlip.date } : null;
    return { jump, fast, first1m, streak, flips };
  }
  function headline() {
    const gv = teamTotal("goud", "views"), zv = teamTotal("zilver", "views");
    if (!gv && !zv) return null;
    const lead = gv >= zv ? "goud" : "zilver", trail = lead === "goud" ? "zilver" : "goud";
    const gap = Math.abs(gv - zv);
    const lr = teamRate(lead, "views"), tr = teamRate(trail, "views");
    let s = `${MEDAL[lead]} ${TEAMNAME[lead]} leidt met ${fmtC(gap)} views voorsprong.`;
    if (lr != null && tr != null) {
      if (tr > lr) {
        const days = gap / (tr - lr);
        if (days < 3650) s += ` ${MEDAL[trail]} ${TEAMNAME[trail]} groeit sneller (+${fmtC(tr)}/dag vs +${fmtC(lr)}/dag) en haalt bij dit tempo in rond ${fmtDateWk(isoAddDays(lastDate(), Math.ceil(days)))}. 🔮`;
        else s += ` ${MEDAL[trail]} ${TEAMNAME[trail]} groeit iets sneller, maar inhalen duurt bij dit tempo nog jaren. 🐢`;
      } else {
        s += ` En ${TEAMNAME[lead]} groeit ook nog eens sneller (+${fmtC(lr)}/dag vs +${fmtC(tr)}/dag) — de voorsprong groeit. 📈`;
      }
    }
    return s;
  }

  /* ============================== chart kit =============================== */
  function niceNum(x, round) {
    if (x <= 0) return 1;
    const exp = Math.floor(Math.log10(x));
    const f = x / 10 ** exp;
    let nf;
    if (round) nf = f < 1.5 ? 1 : f < 3 ? 2 : f < 7 ? 5 : 10;
    else nf = f <= 1 ? 1 : f <= 2 ? 2 : f <= 5 ? 5 : 10;
    return nf * 10 ** exp;
  }
  function niceScale(min, max, maxTicks = 4) {
    if (!isFinite(min) || !isFinite(max)) { min = 0; max = 1; }
    if (min === max) { const p = Math.abs(min) || 1; min -= p * .1; max += p * .1; }
    const step = niceNum(niceNum(max - min, false) / Math.max(1, maxTicks), true);
    const lo = Math.floor(min / step) * step, hi = Math.ceil(max / step) * step;
    const ticks = [];
    for (let v = lo; v <= hi + step / 2; v += step) ticks.push(Math.abs(v) < step / 1e6 ? 0 : v);
    return { lo, hi, ticks };
  }
  function xTickIdxs(n, maxLabels) {
    if (n <= maxLabels) return [...Array(n).keys()];
    const step = Math.ceil((n - 1) / Math.max(1, maxLabels - 1));
    const out = [];
    for (let i = 0; i < n; i += step) out.push(i);
    if (out[out.length - 1] !== n - 1) {
      if (n - 1 - out[out.length - 1] < step / 2) out.pop();
      out.push(n - 1);
    }
    return out;
  }
  function pathFrom(values, X, Y) {
    let d = "", started = false;
    values.forEach((v, i) => {
      if (v == null) { started = false; return; }
      d += (started ? " L " : " M ") + X(i).toFixed(1) + " " + Y(v).toFixed(1);
      started = true;
    });
    return d.trim();
  }

  // Lijngrafiek met crosshair-tooltip. cfg: { dates, series:[{label,color,values,emoji?}],
  //   height?, showZero?, area?, diverging?, endLabels?, yFmt? }
  function drawLine(host, cfg) {
    host.textContent = "";
    const dates = cfg.dates, n = dates.length;
    const series = cfg.series.filter(s => s.values.some(v => v != null));
    if (n < 2 || !series.length) { host.append(el("div", { class: "chart-empty" }, "Nog te weinig data voor deze grafiek.")); return; }
    const W = Math.max(280, host.clientWidth || 320);
    const H = cfg.height || (W < 480 ? 215 : 250);
    const yFmt = cfg.yFmt || fmtC;
    const vals = [];
    for (const s of series) for (const v of s.values) if (v != null) vals.push(v);
    if (cfg.showZero) vals.push(0);
    const { lo, hi, ticks } = niceScale(Math.min(...vals), Math.max(...vals), 4);
    const tickStrs = ticks.map(yFmt);
    const padL = 10 + Math.max(...tickStrs.map(t => t.length)) * 6.6;
    const endTexts = cfg.endLabels ? series.map(s => { const lv = [...s.values].reverse().find(v => v != null); return yFmt(lv); }) : [];
    const padR = cfg.endLabels ? 20 + Math.max(...endTexts.map(t => t.length), 0) * 6.8 : 14;
    const padT = 12, padB = 26;
    const iw = W - padL - padR, ih = H - padT - padB;
    // tijd-geschaalde x-as: ongelijke intervallen tussen updates blijven eerlijk
    const xs = dates.map(d => Date.parse(d + "T00:00:00Z"));
    const xspan = xs[n - 1] - xs[0] || 1;
    const X = i => padL + ((xs[i] - xs[0]) / xspan) * iw;
    const Y = v => padT + ih - ((v - lo) / (hi - lo)) * ih;
    const svg = sv("svg", { width: W, height: H, viewBox: `0 0 ${W} ${H}`, style: "touch-action: pan-y;" });

    for (const t of ticks) {
      svg.append(sv("line", { class: "gridline", x1: padL, x2: W - padR, y1: Y(t).toFixed(1), y2: Y(t).toFixed(1) }));
      svg.append(sv("text", { class: "ticktext", x: padL - 6, y: (Y(t) + 3.5).toFixed(1), "text-anchor": "end" }, yFmt(t)));
    }
    if (cfg.showZero && lo < 0 && hi > 0) svg.append(sv("line", { class: "axline", x1: padL, x2: W - padR, y1: Y(0).toFixed(1), y2: Y(0).toFixed(1) }));

    // x-labels: doelposities gelijkmatig over de breedte, gesnapt naar echte datapunten
    const want = Math.max(3, Math.floor(iw / 68));
    const snapped = [];
    for (let k = 0; k < want; k++) {
      const tx = padL + (want === 1 ? 0 : (k / (want - 1)) * iw);
      let best = 0, bd = Infinity;
      for (let i = 0; i < n; i++) { const d = Math.abs(X(i) - tx); if (d < bd) { bd = d; best = i; } }
      snapped.push(best);
    }
    const labIdx = [];
    for (const i of [...new Set(snapped)].sort((a, b) => a - b)) {
      if (labIdx.length && X(i) - X(labIdx[labIdx.length - 1]) < 52) {
        if (i === n - 1) labIdx.pop(); else continue;
      }
      labIdx.push(i);
    }
    for (const i of labIdx) {
      const anchor = i === 0 ? "start" : i === n - 1 ? "end" : "middle";
      svg.append(sv("text", { class: "xticktext", x: X(i).toFixed(1), y: H - 7, "text-anchor": anchor }, fmtDate(dates[i])));
    }

    const y0 = Y(Math.max(lo, Math.min(hi, 0)));
    for (const s of series) {
      const d = pathFrom(s.values, X, Y);
      if (!d) continue;
      if (cfg.diverging) {
        const li = s.values.map((v, i) => v == null ? null : i).filter(i => i != null);
        const areaD = d + ` L ${X(li[li.length - 1]).toFixed(1)} ${y0.toFixed(1)} L ${X(li[0]).toFixed(1)} ${y0.toFixed(1)} Z`;
        const uid = "clip" + Math.random().toString(36).slice(2, 8);
        svg.append(
          sv("clipPath", { id: uid + "a" }, sv("rect", { x: 0, y: 0, width: W, height: y0 })),
          sv("clipPath", { id: uid + "b" }, sv("rect", { x: 0, y: y0, width: W, height: H - y0 })),
          sv("path", { d: areaD, fill: C.gold, opacity: .16, "clip-path": `url(#${uid}a)` }),
          sv("path", { d: areaD, fill: C.silver, opacity: .2, "clip-path": `url(#${uid}b)` }),
        );
      } else if (cfg.area && !s.values.includes(null)) {
        const areaD = d + ` L ${X(n - 1).toFixed(1)} ${(padT + ih).toFixed(1)} L ${X(0).toFixed(1)} ${(padT + ih).toFixed(1)} Z`;
        svg.append(sv("path", { d: areaD, fill: s.color, opacity: .09 }));
      }
      svg.append(sv("path", { d, fill: "none", stroke: s.color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }));
    }
    // eindmarkers met surface-ring
    const lastPts = series.map(s => {
      let i = n - 1; while (i >= 0 && s.values[i] == null) i--;
      return i < 0 ? null : { x: X(i), y: Y(s.values[i]), s };
    }).filter(Boolean);
    for (const p of lastPts) svg.append(sv("circle", { cx: p.x.toFixed(1), cy: p.y.toFixed(1), r: 4.5, fill: p.s.color, stroke: C.card, "stroke-width": 2 }));

    // eindlabels (waarde in ink, identiteit via kleurstreepje) met botsing-nudge
    if (cfg.endLabels) {
      const labs = lastPts.map((p, i) => ({ ...p, text: endTexts[series.indexOf(p.s)], yl: p.y })).sort((a, b) => a.yl - b.yl);
      for (let i = 1; i < labs.length; i++) if (labs[i].yl < labs[i - 1].yl + 16) labs[i].yl = labs[i - 1].yl + 16;
      const over = labs.length ? labs[labs.length - 1].yl - (H - padB - 2) : 0;
      if (over > 0) for (const l of labs) l.yl -= over;
      for (const l of labs) {
        if (Math.abs(l.yl - l.y) > 7) svg.append(sv("line", { x1: (l.x + 5).toFixed(1), y1: l.y.toFixed(1), x2: (l.x + 12).toFixed(1), y2: l.yl.toFixed(1), stroke: l.s.color, "stroke-width": 1, opacity: .6 }));
        svg.append(sv("rect", { x: (l.x + 8).toFixed(1), y: (l.yl - 1.5).toFixed(1), width: 10, height: 3, rx: 1.5, fill: l.s.color }));
        svg.append(sv("text", { class: "endlabel", x: (l.x + 22).toFixed(1), y: (l.yl + 4).toFixed(1) }, l.text));
      }
    }

    // crosshair + tooltip
    const cross = sv("line", { class: "crossline", y1: padT, y2: padT + ih, visibility: "hidden" });
    svg.append(cross);
    const hoverDots = series.map(s => { const c = sv("circle", { r: 4.5, fill: s.color, stroke: C.card, "stroke-width": 2, visibility: "hidden" }); svg.append(c); return c; });
    const tip = el("div", { class: "tip" });
    host.append(svg, tip);
    const hit = sv("rect", { x: padL, y: 0, width: Math.max(1, iw), height: H, fill: "transparent" });
    svg.append(hit);
    function showAt(clientX) {
      const rect = svg.getBoundingClientRect();
      const pxX = (clientX - rect.left) * (W / rect.width);
      let i = 0, bd = Infinity;
      for (let k = 0; k < n; k++) { const d = Math.abs(X(k) - pxX); if (d < bd) { bd = d; i = k; } }
      cross.setAttribute("x1", X(i)); cross.setAttribute("x2", X(i)); cross.setAttribute("visibility", "visible");
      const rows = [];
      series.forEach((s, si) => {
        const v = s.values[i];
        if (v == null) { hoverDots[si].setAttribute("visibility", "hidden"); return; }
        hoverDots[si].setAttribute("cx", X(i)); hoverDots[si].setAttribute("cy", Y(v)); hoverDots[si].setAttribute("visibility", "visible");
        rows.push({ color: s.color, val: yFmt(v), lbl: (s.emoji ? s.emoji + " " : "") + s.label });
      });
      tip.textContent = "";
      tip.append(el("div", { class: "tip-date" }, fmtDateWk(dates[i])));
      for (const r of rows) tip.append(el("div", { class: "tip-row" },
        el("span", { class: "tip-key", style: `background:${r.color}` }),
        el("span", { class: "tip-val" }, r.val),
        el("span", { class: "tip-lbl" }, r.lbl)));
      tip.style.display = "block";
      const tw = tip.offsetWidth;
      const px = X(i) * (rect.width / W);
      tip.style.left = Math.max(4, Math.min(rect.width - tw - 4, px - tw / 2)) + "px";
    }
    function hide() { cross.setAttribute("visibility", "hidden"); hoverDots.forEach(d => d.setAttribute("visibility", "hidden")); tip.style.display = "none"; }
    hit.addEventListener("pointermove", e => showAt(e.clientX));
    hit.addEventListener("pointerdown", e => showAt(e.clientX));
    svg.addEventListener("pointerleave", hide);
  }

  // Gegroepeerde staafgrafiek. cfg: { dates(groeplabels), series:[{label,color}], matrix[si][gi], yFmt? }
  function drawBars(host, cfg) {
    host.textContent = "";
    const nG = cfg.dates.length, series = cfg.series;
    if (!nG || !series.length) { host.append(el("div", { class: "chart-empty" }, "Nog te weinig data voor deze grafiek.")); return; }
    const W = Math.max(280, host.clientWidth || 320);
    const H = cfg.height || (W < 480 ? 210 : 240);
    const yFmt = cfg.yFmt || fmtC;
    const vals = [0];
    cfg.matrix.forEach(row => row.forEach(v => { if (v != null) vals.push(v); }));
    const { lo, hi, ticks } = niceScale(Math.min(...vals), Math.max(...vals), 4);
    const tickStrs = ticks.map(yFmt);
    const padL = 10 + Math.max(...tickStrs.map(t => t.length)) * 6.6;
    const padR = 10, padT = 12, padB = 26;
    const iw = W - padL - padR, ih = H - padT - padB;
    const Y = v => padT + ih - ((v - lo) / (hi - lo)) * ih;
    const y0 = Y(Math.max(lo, Math.min(hi, 0)));
    const svg = sv("svg", { width: W, height: H, viewBox: `0 0 ${W} ${H}`, style: "touch-action: pan-y;" });
    for (const t of ticks) {
      svg.append(sv("line", { class: "gridline", x1: padL, x2: W - padR, y1: Y(t).toFixed(1), y2: Y(t).toFixed(1) }));
      svg.append(sv("text", { class: "ticktext", x: padL - 6, y: (Y(t) + 3.5).toFixed(1), "text-anchor": "end" }, yFmt(t)));
    }
    svg.append(sv("line", { class: "axline", x1: padL, x2: W - padR, y1: y0.toFixed(1), y2: y0.toFixed(1) }));
    const band = iw / nG;
    const m = series.length;
    const bw = Math.max(3, Math.min(24, (band * .66 - 2 * (m - 1)) / m));
    const groupW = bw * m + 2 * (m - 1);
    function barPath(x, yv) {
      const up = yv <= y0;
      const r = Math.min(4, bw / 2, Math.abs(y0 - yv));
      if (Math.abs(y0 - yv) < 1.2) return `M ${x} ${y0 - .6} h ${bw} v 1.2 h ${-bw} Z`;
      if (up) return `M ${x} ${y0} V ${yv + r} Q ${x} ${yv} ${x + r} ${yv} H ${x + bw - r} Q ${x + bw} ${yv} ${x + bw} ${yv + r} V ${y0} Z`;
      return `M ${x} ${y0} V ${yv - r} Q ${x} ${yv} ${x + r} ${yv} H ${x + bw - r} Q ${x + bw} ${yv} ${x + bw} ${yv - r} V ${y0} Z`;
    }
    const groupsEls = [];
    for (let g = 0; g < nG; g++) {
      const gx = padL + g * band + (band - groupW) / 2;
      const grp = sv("g", {});
      series.forEach((s, si) => {
        const v = cfg.matrix[si][g];
        if (v == null) return;
        grp.append(sv("path", { d: barPath(gx + si * (bw + 2), Y(v)), fill: s.color }));
      });
      svg.append(grp); groupsEls.push(grp);
    }
    for (const i of xTickIdxs(nG, Math.max(3, Math.floor(iw / 68)))) {
      svg.append(sv("text", { class: "xticktext", x: (padL + i * band + band / 2).toFixed(1), y: H - 7, "text-anchor": "middle" }, fmtDate(cfg.dates[i])));
    }
    const tip = el("div", { class: "tip" });
    host.append(svg, tip);
    let curG = -1;
    function showG(g, rectW) {
      if (g === curG) return; curG = g;
      groupsEls.forEach((grp, gi) => grp.setAttribute("opacity", gi === g ? "1" : ".45"));
      tip.textContent = "";
      tip.append(el("div", { class: "tip-date" }, fmtDateWk(cfg.dates[g])));
      series.forEach((s, si) => {
        const v = cfg.matrix[si][g];
        if (v == null) return;
        tip.append(el("div", { class: "tip-row" },
          el("span", { class: "tip-key", style: `background:${s.color}` }),
          el("span", { class: "tip-val" }, fmtSign(v)),
          el("span", { class: "tip-lbl" }, s.label)));
      });
      tip.style.display = "block";
      const tw = tip.offsetWidth;
      const px = (padL + g * band + band / 2) * (rectW / W);
      tip.style.left = Math.max(4, Math.min(rectW - tw - 4, px - tw / 2)) + "px";
    }
    function hideG() { curG = -1; groupsEls.forEach(g => g.setAttribute("opacity", "1")); tip.style.display = "none"; }
    const hit = sv("rect", { x: padL, y: 0, width: Math.max(1, iw), height: H, fill: "transparent" });
    svg.append(hit);
    hit.addEventListener("pointermove", e => {
      const rect = svg.getBoundingClientRect();
      const g = Math.max(0, Math.min(nG - 1, Math.floor((e.clientX - rect.left - padL * (rect.width / W)) / (band * (rect.width / W)))));
      showG(g, rect.width);
    });
    hit.addEventListener("pointerdown", e => { curG = -1; hit.dispatchEvent(new PointerEvent("pointermove", { clientX: e.clientX, bubbles: true })); const rect = svg.getBoundingClientRect(); showG(Math.max(0, Math.min(nG - 1, Math.floor((e.clientX - rect.left - padL * (rect.width / W)) / (band * (rect.width / W))))), rect.width); });
    svg.addEventListener("pointerleave", hideG);
  }

  function drawSpark(host, values, color, h = 40) {
    host.textContent = "";
    const w = Math.max(60, host.clientWidth || 100);
    if (!values || values.length < 2) { host.append(el("div", { class: "chart-empty", style: "padding:4px 0;font-size:11px" }, "nog geen data")); return; }
    const min = Math.min(...values), max = Math.max(...values);
    const span = max - min || 1;
    const X = i => 2 + (i / (values.length - 1)) * (w - 10);
    const Y = v => 3 + (1 - (v - min) / span) * (h - 8);
    const svg = sv("svg", { width: w, height: h, viewBox: `0 0 ${w} ${h}` });
    svg.append(sv("path", { d: pathFrom(values, X, Y), fill: "none", stroke: color, "stroke-width": 1.8, "stroke-linejoin": "round", "stroke-linecap": "round", opacity: .95 }));
    svg.append(sv("circle", { cx: X(values.length - 1).toFixed(1), cy: Y(values[values.length - 1]).toFixed(1), r: 3, fill: color, stroke: C.card, "stroke-width": 1.5 }));

  function saveForm() {
    const f = state.form;
    if (!f.date) { toast("Kies een datum"); return; }
    const rows = [];
    if (f.mode === "quick") {
      for (const ch of DB.channels) {
        const r = f.quick[ch.id];
        if (!r) continue;
        const subs = parseNum(r.subs), views = parseNum(r.views);
        if (subs == null && views == null) continue;
        if (Number.isNaN(subs) || Number.isNaN(views)) { toast(`Ongeldig getal bij ${ch.name}`); return; }
        if (subs == null || views == null) { toast(`Vul bij ${ch.name} subs én views in`); return; }
        rows.push({ ch, subs, views });
      }
      if (!rows.length) { toast("Niets ingevuld"); return; }
    } else {
      const s = f.single;
      const ch = channelOf(s.channelId);
      const subs = parseNum(s.subs), views = parseNum(s.views);
      if (subs == null || views == null || Number.isNaN(subs) || Number.isNaN(views)) { toast("Vul subs én views in (alleen cijfers)"); return; }
      rows.push({ ch, subs, views });
    }
    const drops = rows.filter(({ ch, subs, views }) => {
      const l = latest(ch.id);
      return l && l.date < f.date && (views < l.views || subs < l.subs);
    });
    if (drops.length && !confirm(`⚠️ Bij ${drops.map(d => d.ch.name).join(", ")} is de nieuwe waarde lager dan de vorige. Typfout? Klik OK om toch op te slaan.`)) return;
    const ts = Date.parse(f.date + "T00:00:00Z");
    const now = Date.now();
    const entries = rows.map(({ ch, subs, views }, i) => ({ id: now + i, channelId: ch.id, subs, views, date: f.date, timestamp: ts }));
    pending.push(...entries);
    savePending();
    mergeStats();
    state.form = null;
    render();
    toast(`✅ ${entries.length} ${entries.length === 1 ? "invoer" : "invoeren"} opgeslagen — klik straks "Export data.json" en push naar GitHub`);
  }

        return el("div", { class: "lb-row" + (i < 3 ? " top" : "") },
          el("span", { class: "lb-rank" }, i < 3 ? medals[i] : i + 1),
          el("div", { class: "lb-main" },
            el("div", { class: "lb-name" }, r.c.name, medalChip(r.c.team),
              move !== 0 ? el("span", { class: "rankmove " + (move > 0 ? "up" : "down") }, move > 0 ? `▲${move}` : `▼${-move}`) : null),
            el("div", { class: "lb-bar" }, el("div", { class: "lb-fill", style: `width:${(r.v / maxV * 100).toFixed(1)}%;background:${r.c.team === "goud" ? C.gold : C.silver}` }))),
          el("div", { class: "lb-nums" },
            el("div", { class: "v" }, fmtC(r.v)),
            el("div", { class: "s" }, r.v !== r.pv ? fmtSign(r.v - r.pv) + " sinds vorige" : "–")));
      }));
  }

  /* ============================== UI: kanalen tab ========================= */
  function viewChannels() {
    return [raceCard(), minisCard(), headToHeadCard()];
  }
  function raceCard() {
    const last = lastDate();
    const rows = DB.channels.map(c => {
      const v = valueAt(c.id, last, "views") || 0;
      const rate = ratePerDay(c.id, "views");
      const remaining = TARGET - v;
      let eta = null;
      if (v >= TARGET) eta = "🎉 GEMONETISEERD!";
      else if (rate && rate > 0) {
        const days = remaining / rate;
        const etaIso = isoAddDays(last, Math.ceil(days));
        eta = days > 3650 ? "≈ >10 jaar 😅" : `≈ nog ${fmtInt(Math.ceil(days))} dagen (${days > 300 ? fmtDateY(etaIso) : fmtDate(etaIso)})`;
      }
      return { c, v, rate, eta };
    }).sort((a, b) => b.v - a.v);
    return el("section", { class: "card" },
      el("div", { class: "card-head" }, el("h3", {}, `🏁 Race naar ${fmtC(TARGET)} views`)),
      el("p", { class: "card-sub" }, "Monetisatie-doel per kanaal, met schatting op basis van de groei van de laatste 14 dagen."),
      rows.map(({ c, v, rate, eta }) => el("div", { class: "race-row" },
        el("div", { class: "race-top" },
          el("span", { class: "nm" }, `${MEDAL[c.team]} ${c.name}`),
          el("span", { class: "v" }, `${fmtC(v)} / ${fmtC(TARGET)}`)),
        el("div", { class: "meter " + (c.team === "goud" ? "g" : "z") },
          el("div", { class: "meter-fill", style: `width:${Math.min(100, v / TARGET * 100).toFixed(2)}%;background:${c.team === "goud" ? C.gold : C.silver}` })),
        el("div", { class: "race-sub" },
          el("span", {}, `${(v / TARGET * 100).toFixed(1)}%`),
          el("span", {}, eta || (rate == null ? "nog te weinig data voor een schatting" : "–")),
          el("span", {}, rate ? `+${fmtC(rate)}/dag` : "")))));
  }
  function minisCard() {
    const minis = DB.channels.map(c => {
      const snaps = snapsOf(c.id);
      const l = latest(c.id), p = prevSnap(c.id);
      const sparkHost = el("div", { class: "sp" });
      chartJobs.push(() => { if (sparkHost.isConnected) drawSpark(sparkHost, snaps.map(s => s.views), c.team === "goud" ? C.gold : C.silver, 40); });
      return el("div", { class: "mini" },
        el("div", { class: "nm" }, `${MEDAL[c.team]} ${c.name}`),
        el("div", { class: "v" }, l ? fmtC(l.views) : "–"),
        el("div", { class: "d" }, l && p ? deltaSpan(l.views - p.views, " views") : el("span", { class: "muted" }, l ? `${fmtC(l.subs)} subs` : "—")),
        sparkHost);
    });
    return el("section", { class: "card" },
      el("div", { class: "card-head" }, el("h3", {}, "📊 Alle kanalen — views") ),
      el("p", { class: "card-sub" }, "Eén mini-grafiek per kanaal (zelfde kleur = zelfde team), zo blijft alles leesbaar."),
      el("div", { class: "minis" }, minis));
  }
  function headToHeadCard() {
    const selects = el("div", { class: "filters", style: "margin-bottom:8px" },
      el("div", { class: "segc", style: "padding:0;border:0;background:none;gap:8px" },
        el("select", { class: "btn", style: "max-width:46vw", oninput: e => { state.cmpA = e.target.value; render(); } },
          DB.channels.map(c => el("option", { value: c.id, selected: c.id === state.cmpA }, `${MEDAL[c.team]} ${c.name}`))),
        el("span", { class: "muted", style: "align-self:center;font-weight:700" }, "vs"),
        el("select", { class: "btn", style: "max-width:46vw", oninput: e => { state.cmpB = e.target.value; render(); } },
          DB.channels.map(c => el("option", { value: c.id, selected: c.id === state.cmpB }, `${MEDAL[c.team]} ${c.name}`)))));
    const A = channelOf(state.cmpA), B = channelOf(state.cmpB);
    if (!A || !B) return el("section", { class: "card" }, el("h3", {}, "🤜🤛 Head-to-head"), selects);
    const same = A.id === B.id;
    const firstA = snapsOf(A.id)[0]?.date, firstB = snapsOf(B.id)[0]?.date;
    const start = [firstA, firstB].filter(Boolean).sort()[0];
    const dates = start ? ALL_DATES.filter(d => d >= start) : [];
    const valsA = dates.map(d => valueAt(A.id, d, "views"));
    const valsB = dates.map(d => valueAt(B.id, d, "views"));
    const vA = latest(A.id)?.views ?? null, vB = latest(B.id)?.views ?? null;
    const rA = ratePerDay(A.id, "views"), rB = ratePerDay(B.id, "views");
    let verdict = null;
    if (!same && vA != null && vB != null && rA != null && rB != null) {
      const [lead, trail] = vA >= vB ? [{ c: A, v: vA, r: rA }, { c: B, v: vB, r: rB }] : [{ c: B, v: vB, r: rB }, { c: A, v: vA, r: rA }];
      if (trail.r > lead.r) {
        const days = (lead.v - trail.v) / (trail.r - lead.r);
        verdict = days < 3650 ? `🔮 ${trail.c.name} groeit sneller en haalt ${lead.c.name} bij dit tempo in rond ${fmtDateWk(isoAddDays(lastDate(), Math.ceil(days)))}.`
          : `🐢 ${trail.c.name} groeit iets sneller, maar inhalen duurt nog jaren.`;
      } else {
        verdict = `📈 ${lead.c.name} leidt én groeit sneller — het gat wordt groter.`;
      }
    }
    const statRow = (ch, v, r, color) => el("div", { class: "kpi", style: `border-top:3px solid ${color}` },
      el("div", { class: "lbl" }, `${MEDAL[ch.team]} ${ch.name}`),
      el("div", { class: "val" }, v == null ? "–" : fmtC(v)),
      el("div", { class: "sub" }, r != null ? `+${fmtC(r)}/dag (14 d)` : "nog geen groeidata"));
    const host = el("div", { class: "chart-host" });
    chartJobs.push(() => {
      if (!host.isConnected) return;
      drawLine(host, {
        dates, endLabels: true,
        series: [
          { label: A.name, color: C.blue, values: valsA },
          { label: B.name, color: C.red, values: valsB },
        ],
      });
    });
    return el("section", { class: "card" },
      el("div", { class: "card-head" }, el("h3", {}, "🤜🤛 Head-to-head")),
      el("p", { class: "card-sub" }, "Kies twee kanalen en vergelijk hun views-race."),
      selects,
      same ? el("p", { class: "chart-empty" }, "Kies twee verschillende kanalen 😉") : [
        el("div", { class: "kpis", style: "grid-template-columns:1fr 1fr" }, statRow(A, vA, rA, C.blue), statRow(B, vB, rB, C.red)),
        legendEl([{ color: C.blue, label: A.name }, { color: C.red, label: B.name }]),
        host,
        verdict ? el("p", { style: "font-size:13.5px;color:var(--ink-2);margin:10px 0 0" }, verdict) : null,
      ]);
  }

  /* ============================== UI: mijlpalen tab ======================= */
  function viewMilestones() {
    const { jump, fast, first1m, streak, flips } = records();
    const ms = milestones();
    const shown = state.msAll ? ms : ms.slice(0, 15);
    const recTiles = el("div", { class: "recs" },
      el("div", { class: "rec" }, el("div", { class: "t" }, "🚀 Grootste sprong in één update"),
        el("div", { class: "v" }, jump ? `+${fmtC(jump.delta)} views` : "–"),
        el("div", { class: "s" }, jump ? `${jump.ch.name} · ${fmtDate(jump.date)} (≈ +${fmtC(jump.delta / jump.days)}/dag)` : "")),
      el("div", { class: "rec" }, el("div", { class: "t" }, "🔥 Snelste groeier nu (14 d)"),
        el("div", { class: "v" }, fast ? `+${fmtC(fast.rate)}/dag` : "–"),
        el("div", { class: "s" }, fast ? `${MEDAL[fast.ch.team]} ${fast.ch.name}` : "")),
      el("div", { class: "rec" }, el("div", { class: "t" }, "🏁 Eerste naar 1M views"),
        el("div", { class: "v" }, first1m ? first1m.ch.name : "nog niemand"),
        el("div", { class: "s" }, first1m ? `${MEDAL[first1m.ch.team]} op ${fmtDate(first1m.date)}` : "")),
      el("div", { class: "rec" }, el("div", { class: "t" }, "👑 Huidige leiding"),
        el("div", { class: "v" }, streak ? `${MEDAL[streak.team]} ${TEAMNAME[streak.team]} — ${streak.days} dagen` : "–"),
        el("div", { class: "s" }, streak ? `onafgebroken sinds ${fmtDate(streak.since)}` : "")));
    const flipRows = flips.map((f, i) => el("div", { class: "ms-row" },
      el("span", { class: "d" }, fmtDate(f.date)),
      el("span", {}, i === 0 ? `🚦 Start — ${MEDAL[f.team]} ${TEAMNAME[f.team]} pakt als eerste de leiding` : `👑 ${MEDAL[f.team]} ${TEAMNAME[f.team]} neemt de leiding over!`)));
    return [
      el("section", { class: "card" },
        el("div", { class: "card-head" }, el("h3", {}, "🏅 Records")), recTiles),
      el("section", { class: "card" },
        el("div", { class: "card-head" }, el("h3", {}, "👑 Leiderschap") ),
        flips.length ? flipRows : el("p", { class: "chart-empty" }, "Nog geen data.")),
      el("section", { class: "card" },
        el("div", { class: "card-head" }, el("h3", {}, "🎯 Mijlpalen"),
          ms.length > 15 ? el("button", { class: "btn btn-sm", onclick: () => { state.msAll = !state.msAll; render(); } }, state.msAll ? "minder" : `alles (${ms.length})`) : null),
        shown.length ? shown.map(m => el("div", { class: "ms-row" },
          el("span", { class: "d" }, fmtDate(m.date)),
          el("span", {}, `${m.emoji} `, m.text, " ", medalChip(m.team)))) : el("p", { class: "chart-empty" }, "Nog geen mijlpalen.")),
    ];
  }

  /* ============================== UI: historiek tab ======================= */
  function viewHistory() {
    const pendingIds = new Set(pending.map(p => p.id));
    const byDate = new Map();
    for (const [chId, snaps] of SNAP) for (const s of snaps) {
      if (!byDate.has(s.date)) byDate.set(s.date, []);
      byDate.get(s.date).push({ chId, ...s });
    }
    const dates = [...byDate.keys()].sort().reverse();
    const pendingCard = pending.length ? el("section", { class: "card" },
      el("div", { class: "card-head" }, el("h3", {}, "🕐 Lokale invoer — nog niet gepusht")),
      el("p", { class: "card-sub" }, "Deze staan alleen op dit toestel. Klik \"Export data.json\", vervang het bestand in GitHub en push — daarna verdwijnen ze hier vanzelf."),
      pending.map(p => {
        const ch = channelOf(p.channelId);
        return el("div", { class: "trow" },
          el("span", { class: "nm" }, `${ch ? MEDAL[ch.team] + " " + ch.name : p.channelId}`, el("span", { class: "muted small" }, ` · ${fmtDate(p.date)}`)),
          el("span", { class: "vals" }, el("div", { class: "v" }, `${fmtInt(p.views)} views`), el("div", { class: "s" }, `${fmtInt(p.subs)} subs`)),
          el("button", { class: "btn btn-sm", onclick: () => deletePending(p.id) }, "🗑️"));
      })) : null;
    const wf = el("details", { class: "wf" },
      el("summary", {}, "📖 Hoe werkt het updaten?"),
      el("ol", {},
        el("li", {}, "Klik ", el("b", {}, "➕ Stats invoeren"), " en vul de nieuwe cijfers in (alle kanalen in één keer kan!)."),
        el("li", {}, "Klik ", el("b", {}, "⬇️ Export data.json"), " — je downloadt het nieuwe databestand."),
        el("li", {}, "Vervang ", el("b", {}, "dashboard/data.json"), " in GitHub en push (of upload via de GitHub-website)."),
        el("li", {}, "Netlify deployt automatisch (±1 min). De ander klikt 🔄 Herladen en ziet alles.")),
      el("p", { class: "small muted" }, "Je invoer wordt lokaal bewaard tot de push gelukt is — je raakt niets kwijt als je de pagina sluit."));
    const dateCards = dates.map(d => {
      const rows = byDate.get(d).map(r => ({ ...r, ch: channelOf(r.chId) }))
        .sort((a, b) => (b.views) - (a.views));
      return el("section", { class: "card" },
        el("div", { class: "hist-date" }, fmtDateLong(d)),
        el("div", { class: "table-scroll" }, el("table", { class: "dt" },
          el("thead", {}, el("tr", {}, el("th", {}, "Kanaal"), el("th", { class: "num" }, "Views"), el("th", { class: "num" }, "Δ views"), el("th", { class: "num" }, "Subs"), el("th", { class: "num" }, "Δ subs"))),
          el("tbody", {}, rows.map(r => {
            const prevList = snapsOf(r.chId).filter(s => s.date < d);
            const prev = prevList[prevList.length - 1];
            return el("tr", {},
              el("td", {}, `${MEDAL[r.ch.team]} ${r.ch.name}`, pendingIds.has(r.id) ? " 🕐" : ""),
              el("td", { class: "num" }, fmtInt(r.views)),
              el("td", { class: "num" }, prev ? deltaSpan(r.views - prev.views) : el("span", { class: "muted" }, "–")),
              el("td", { class: "num" }, fmtInt(r.subs)),
              el("td", { class: "num" }, prev ? deltaSpan(r.subs - prev.subs) : el("span", { class: "muted" }, "–")));
          })))));
    });
    return [pendingCard, wf, dateCards.length ? dateCards : el("section", { class: "card" }, el("p", { class: "chart-empty" }, "Nog geen data — voer de eerste stats in!"))];
  }

  /* ============================== render ================================= */
  function render() {
    chartJobs = [];
    const app = document.getElementById("app");
    app.textContent = "";
    app.append(header());
    if (state.err) app.append(el("div", { class: "errbar" }, "⚠️ " + state.err + " ",
      el("button", { class: "btn btn-sm", onclick: () => reload(true) }, "opnieuw proberen")));
    app.append(actionsRow());
    const fp = formPanel();
    if (fp) app.append(fp);
    app.append(tabBar());
    const view = { battle: viewBattle, charts: viewCharts, channels: viewChannels, milestones: viewMilestones, history: viewHistory }[state.tab] || viewBattle;
    for (const node of [view()].flat(9)) if (node) app.append(node);
    for (const job of chartJobs) job();
  }
  window.addEventListener("resize", debounce(() => { for (const job of chartJobs) job(); }, 180));
  window.addEventListener("error", e => {
    const app = document.getElementById("app");
    if (app && !app.querySelector(".errbar.js")) app.prepend(el("div", { class: "errbar js" }, "⚠️ Er ging iets mis: " + (e.message || "onbekende fout")));
  });
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden && Date.now() - lastFetch > 5 * 60e3 && !state.form && !pending.length) reload(false);
  });

  /* ============================== init =================================== */
  (async function init() {
    const hash = (location.hash || "").slice(1);
    if (TABS.some(([id]) => id === hash)) state.tab = hash;
    pending = loadPending();
    try {
      await loadData();
    } catch (e) {
      state.err = "Kon data.json niet laden (" + e.message + "). Controleer of het bestand bestaat.";
      mergeStats();
    }
    if (hash === "invoer") state.form = newFormState(); // #invoer als snelkoppeling naar het formulier
    render();
  })();
  </script>
</body>
</html>
